name: 🤖 Gemini Dispatcher
run-name: 🤖 Dispatching AI task for issue ${{ github.event.issue.number }}

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # === コメントをトリガーとするジョブ ===
  dispatch-on-comment:
    # 実行条件：ボットからのコメントではなく、特定のコマンドを含む
    if: github.event.sender.type != 'Bot' && contains(github.event.comment.body, '@gemini-cli /fix')
    
    # ジョブの定義：ステップを実行するのではなく、別のワークフローを呼び出す
    uses: ./.github/workflows/ai-code-generator.yml
    
    # 呼び出すワークフローに渡すパラメータ
    with:
      issue_number: ${{ github.event.issue.number }}
      prompt: ${{ github.event.comment.body }}
      
    # 呼び出すワークフローに渡すシークレット
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # === ラベルをトリガーとするジョブ ===
  dispatch-on-label:
    # 実行条件：特定のラベルが付与された
    if: github.event.label.name == 'ready-for-ai'
    
    # ジョブの定義：ステップを実行するのではなく、別のワークフローを呼び出す
    uses: ./.github/workflows/ai-code-generator.yml
    
    # 呼び出すワークフローに渡すパラメータ
    with:
      issue_number: ${{ github.event.issue.number }}
      prompt: "Fix the issue described in #${{ github.event.issue.number }} based on GEMINI.md."
      
    # 呼び出すワークフローに渡すシークレット
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}