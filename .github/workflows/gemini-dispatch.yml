name: 🤖 Gemini Dispatcher
run-name: 🤖 Dispatching AI task for issue ${{ github.event.issue.number }}

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  dispatch-on-comment:
    # コメントが自分自身（bot）でなく、`/fix` を含む場合のみ実行
    if: github.event.sender.type != 'Bot' && contains(github.event.comment.body, '@gemini-cli /fix')
    runs-on: ubuntu-latest
    permissions:
      actions: write # workflow_callを呼び出すために必要
    steps:
      - name: Call AI Code Generator
        uses: ./.github/workflows/ai-code-generator.yml
        with:
          issue_number: ${{ github.event.issue.number }}
          prompt: ${{ github.event.comment.body }}
        secrets:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  dispatch-on-label:
    # 'ready-for-ai' ラベルが付与された場合のみ実行
    if: github.event.label.name == 'ready-for-ai'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Call AI Code Generator
        uses: ./.github/workflows/ai-code-generator.yml
        with:
          issue_number: ${{ github.event.issue.number }}
          prompt: "Fix the issue described in #${{ github.event.issue.number }} based on GEMINI.md."
        secrets:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}