name: 🤖 Gemini Dispatcher
run-name: 🤖 Dispatching AI task for issue ${{ github.event.issue.number }}

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  dispatch-on-comment:
    # README.mdの記述 (@github-actions /fix) にも対応できるように修正
    if: |
      github.event.sender.type != 'Bot' && 
      (contains(github.event.comment.body, '@gemini-cli /fix') || contains(github.event.comment.body, '@github-actions /fix'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/ai-code-generator.yml
    with:
      issue_number: ${{ github.event.issue.number }}
      prompt: ${{ github.event.comment.body }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  dispatch-on-label:
    if: github.event.label.name == 'ready-for-ai'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/ai-code-generator.yml
    with:
      issue_number: ${{ github.event.issue.number }}
      prompt: ${{ github.event.issue.body }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
