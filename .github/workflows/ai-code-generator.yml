name: 🤖 AI Code Generator
run-name: 🤖 AI is fixing issue #${{ inputs.issue_number }}

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      prompt:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true
      # PATをSecretとして受け取るように定義
      GH_PAT:
        required: true

jobs:
  run-ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitize user prompt
        id: sanitized_prompt
        run: |
          PROMPT='${{ inputs.prompt }}'
          CLEANED_PROMPT=$(echo "$PROMPT" | sed -E 's/@(gemini-cli|github-actions)\s+\/fix//g' | xargs)
          echo "prompt=$CLEANED_PROMPT" >> $GITHUB_OUTPUT

      - name: Run Gemini CLI for Code Fix
        id: gemini_fix
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_debug: true
          # AIが混乱しないように、よりシンプルで具体的な指示に変更
          prompt: |
            You are an expert Google Apps Script developer.
            Your task is to implement the changes to solve the following request by modifying files.
            You MUST strictly adhere to all instructions and constraints in the GEMINI.md file.
            First, carefully read the content of the target files to understand the context before making changes.
            Use your available tools (like `replace_in_file`) to modify the code.
            Do NOT try to use `git` commands by yourself.
            After finishing ALL file modifications, you MUST conclude your response with the exact phrase: `All tasks are complete.`

            # TASK
            ${{ steps.sanitized_prompt.outputs.prompt }}

      - name: Create Pull Request
        id: cpr
        # Gemini CLIのステップが成功した場合のみ実行
        if: steps.gemini_fix.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          # GITHUB_TOKENの代わりにPATを使用
          token: ${{ secrets.GH_PAT }}
          commit-message: "feat(ai): Apply automated fixes for #${{ inputs.issue_number }}"
          title: "🤖 AI Fix for Issue #${{ inputs.issue_number }}"
          body: |
            This PR was automatically generated by the AI agent to address issue #${{ inputs.issue_number }}.

            Please review the changes and merge if they are correct.
          branch: "ai-fix/issue-${{ inputs.issue_number }}"
          delete-branch: true
          labels: |
            ai-generated
            needs-review

      - name: Log Completion or Failure
        if: always()
        run: |
          if [[ "${{ steps.cpr.outputs.pull-request-number }}" != "" ]]; then
            echo "AI Agent run finished and PR #${{ steps.cpr.outputs.pull-request-number }} was created for issue #${{ inputs.issue_number }}"
          else
            echo "AI Agent did not make any changes or failed. No PR was created."
          fi

