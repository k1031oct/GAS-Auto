name: 🤖 AI Code Generator
run-name: 🤖 AI is fixing issue #${{ inputs.issue_number }}

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      prompt:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  run-ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ユーザーのコメントからAIへの命令トリガーを削除し、純粋な指示だけを抽出
      - name: Sanitize user prompt
        id: sanitized_prompt
        run: |
          PROMPT='${{ inputs.prompt }}'
          # 複数のトリガーコマンド (@gemini-cli, @github-actions) に対応
          CLEANED_PROMPT=$(echo "$PROMPT" | sed -E 's/@(gemini-cli|github-actions)\s+\/fix//g' | xargs)
          echo "prompt=$CLEANED_PROMPT" >> $GITHUB_OUTPUT

      - name: Run Gemini CLI for Code Fix
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_debug: true
          # GEMINI.mdのルールに従わせるため、プロンプトを修正。
          # --auto-commit や --pr-title は使わず、AIにファイル操作ツールを使わせ、完了報告をさせる。
          prompt: |
            You are an expert Google Apps Script developer.
            Your task is to implement the changes to solve the following request.
            You MUST strictly adhere to all instructions and constraints in the GEMINI.md file.
            Use your available tools (like `search_file_content`, `replace_in_file`) to modify the code.
            Do NOT try to use `git` commands by yourself.
            After finishing all file modifications, you MUST conclude your response with the exact phrase: `All tasks are complete.`

            # TASK
            ${{ steps.sanitized_prompt.outputs.prompt }}

            # PROJECT CONTEXT
            The existing code structure (Code.gs, WorkflowService.gs, etc.) and the UI (index.html) are part of a project to build a workflow automation tool on GAS.
            Always convert legacy styling to Tailwind CSS.
            Ensure ModuleService dynamically loads JSON definitions from Drive.
            Omit all API secret management functions.

      - name: Create Pull Request if changes were made
        # このステップは、AIが 'All tasks are complete.' を出力した後に、
        # 差分がある場合のみ実行されるような後続のワークフローを想定しています。
        # ここではAIの実行完了をログに出すに留めます。
        if: always()
        run: |
          echo "AI Agent run finished for issue #${{ inputs.issue_number }}"
          echo "If the agent outputted 'All tasks are complete.', a separate workflow should handle PR creation."
