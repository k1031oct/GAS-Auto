name: 🤖 AI Code Generator
run-name: 🤖 AI is fixing issue #${{ inputs.issue_number }}

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      prompt:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  run-ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 回避策はもう不要なので、シンプルなチェックアウトに戻す
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI for Code Fix
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            /fix --auto-commit --pr-title "fix: AI implemented changes for issue #${{ inputs.issue_number }}"

            You are an expert Google Apps Script developer...
            # (以下、プロンプトの内容は変更なし)

      - name: Log Completion
        if: always()
        run: |
          echo "AI Agent run finished for issue #${{ inputs.issue_number }}"