name: 🤖 AI Code Generator
run-name: 🤖 AI is fixing issue #${{ inputs.issue_number }}

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      prompt:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  run-ai-fix:
    runs-on: ubuntu-latest
    permissions:
      # Pull Requestを作成するために権限を追加
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitize user prompt
        id: sanitized_prompt
        run: |
          PROMPT='${{ inputs.prompt }}'
          CLEANED_PROMPT=$(echo "$PROMPT" | sed -E 's/@(gemini-cli|github-actions)\s+\/fix//g' | xargs)
          echo "prompt=$CLEANED_PROMPT" >> $GITHUB_OUTPUT

      - name: Run Gemini CLI for Code Fix
        id: gemini_fix
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_debug: true
          prompt: |
            You are an expert Google Apps Script developer.
            Your task is to implement the changes to solve the following request.
            You MUST strictly adhere to all instructions and constraints in the GEMINI.md file.
            Use your available tools (like `search_file_content`, `replace_in_file`) to modify the code.
            Do NOT try to use `git` commands by yourself.
            After finishing all file modifications, you MUST conclude your response with the exact phrase: `All tasks are complete.`

            # TASK
            ${{ steps.sanitized_prompt.outputs.prompt }}

            # PROJECT CONTEXT
            The existing code structure (Code.gs, WorkflowService.gs, etc.) and the UI (index.html) are part of a project to build a workflow automation tool on GAS.
            Always convert legacy styling to Tailwind CSS.
            Ensure ModuleService dynamically loads JSON definitions from Drive.
            Omit all API secret management functions.

      # ★★★ ここからが追加されたステップです ★★★
      - name: Create Pull Request
        # Gemini CLIが正常に完了報告を出した場合のみ実行
        if: success() && contains(steps.gemini_fix.outputs.text, 'All tasks are complete.')
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(ai): Apply automated fixes for #${{ inputs.issue_number }}"
          title: "🤖 AI Fix for Issue #${{ inputs.issue_number }}"
          body: |
            This PR was automatically generated by the AI agent to address issue #${{ inputs.issue_number }}.

            Please review the changes and merge if they are correct.
          branch: "ai-fix/issue-${{ inputs.issue_number }}"
          delete-branch: true
          labels: |
            ai-generated
            needs-review

      - name: Log Completion or Failure
        if: always()
        run: |
          if [[ "${{ steps.gemini_fix.outcome }}" == "success" && "${{ contains(steps.gemini_fix.outputs.text, 'All tasks are complete.') }}" == "true" ]]; then
            echo "AI Agent run finished and PR was created for issue #${{ inputs.issue_number }}"
          else
            echo "AI Agent did not complete the task successfully. No PR was created."
          fi

