name: 🤖 Gemini AI Agent Autonomy

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      issue_number:
        type: number
        required: true
      prompt:
        type: string
        required: true

jobs:
  ai_agent_fixer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- STEP 1: コンテキスト変数の設定 ---
      - name: Set Context Variables (Unified)
        id: set_context
        run: |
          # 1. ISSUE_NUM を設定
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            ISSUE_NUM="${{ inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          
          # 2. AI_TASK_PROMPT を設定
          AI_TASK_PROMPT=""
          
          # ラベルによる起動の場合
          if [[ "${{ github.event_name }}" == "issues" ]] && [[ "${{ github.event.label.name }}" == "ready-for-ai" ]]; then
             AI_TASK_PROMPT="Fix the issue described in #${ISSUE_NUM} based on GEMINI.md."
          fi
          
          # コメントによる起動の場合
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            COMMENT_BODY="${{ github.event.comment.body }}"
            if echo "$COMMENT_BODY" | grep -q "@gemini-cli /fix"; then
              AI_TASK_PROMPT="$COMMENT_BODY"
            fi
          fi
          
          # workflow_call の場合、inputs.prompt を優先
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
             AI_TASK_PROMPT="${{ inputs.prompt }}"
          fi

          echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "AI_TASK_PROMPT=$AI_TASK_PROMPT" >> $GITHUB_OUTPUT
          
        # このステップでは、トリガー判定は行わず、変数に値を格納するだけに留める。
        # トリガー判定は次のステップの 'if' 条件に委譲する。

      - name: Run Gemini CLI for Code Fix
        # 修正: トリガー判定をここで実施。AI_TASK_PROMPTが空ではないことを確認。
        if: steps.set_context.outputs.AI_TASK_PROMPT != '' && secrets.GEMINI_API_KEY != ''
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert Google Apps Script developer specialized in workflow automation and modern web UI (Tailwind CSS).
            Your task is to implement the necessary changes to solve the following request, strictly adhering to the instructions and constraints in the GEMINI.md file and the issue description.

            # TASK
            ${{ steps.set_context.outputs.AI_TASK_PROMPT }}

            # PROJECT CONTEXT
            The existing code structure (Code.gs, WorkflowService.gs, ModuleService.gs, etc.) and the UI (index.html, javascript.html) are part of a merged project.
            The main goal is to integrate all required changes (Tailwind CSS conversion, Drive JSON module loading, API management omission).

            - Always convert legacy styling (MDL/Inline CSS) to Tailwind CSS.
            - Ensure ModuleService dynamically loads JSON definitions from Drive.
            - Omit all API secret management functions.
            
          command: /fix --auto-commit --pr-title "fix: AI implemented changes for issue #${{ steps.set_context.outputs.ISSUE_NUM }}"

      - name: Log Completion
        if: always()
        run: echo "AI Agent run finished."
