name: 🤖 Gemini AI Agent Autonomy

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      issue_number:
        type: number
        required: true
      prompt:
        type: string
        required: true

jobs:
  ai_agent_fixer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- STEP 1: トリガー判定と変数確定 ---
      - name: Determine Trigger Context
        id: trigger_context
        # シェルスクリプトを最大限にシンプルに保ち、変数の展開エラーを避ける
        run: |
          # 1. Issue番号の確定 (YAMLレベルで確定)
          ISSUE_NUM="${{ github.event.issue.number || inputs.issue_number }}"
          
          # 2. PROMPTの初期化 (inputs.prompt は存在する場合のみ使用)
          AI_TASK_PROMPT="${{ inputs.prompt }}"
          IS_AI_TRIGGERED="false"

          # ラベルによる起動の場合
          if [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "ready-for-ai" ]; then
            IS_AI_TRIGGERED="true"
            AI_TASK_PROMPT="Fix the issue described in #${ISSUE_NUM} based on GEMINI.md."
          fi

          # コメントによる起動の場合
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_BODY="${{ github.event.comment.body }}"
            if echo "$COMMENT_BODY" | grep -q "@gemini-cli /fix"; then
              IS_AI_TRIGGERED="true"
              # コメント全体をプロンプトとして使用 (workflow_callでない場合)
              if [ "${{ github.event_name }}" != "workflow_call" ]; then
                AI_TASK_PROMPT="$COMMENT_BODY"
              fi
            fi
          fi
          
          # workflow_call の場合は既に IS_AI_TRIGGERED が true であり、inputs.prompt が設定されている
          if [ -n "${{ inputs.prompt }}" ]; then
              IS_AI_TRIGGERED="true"
          fi
          
          # --- GITHUB_OUTPUTへの書き出し ---
          if [ "$IS_AI_TRIGGERED" = "true" ]; then
              echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
              echo "ai_prompt=$AI_TASK_PROMPT" >> $GITHUB_OUTPUT
              echo "is_triggered=true" >> $GITHUB_OUTPUT
          else
              echo "::notice file=ai_auto_fix.yml::No explicit AI trigger detected. Skipping job."
              echo "is_triggered=false" >> $GITHUB_OUTPUT
              exit 0
          fi


      - name: Run Gemini CLI for Code Fix
        # secrets.GEMINI_API_KEY が設定されていることを確認し、トリガーが有効な場合のみ実行
        if: steps.trigger_context.outputs.is_triggered == 'true' && secrets.GEMINI_API_KEY != ''
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert Google Apps Script developer specialized in workflow automation and modern web UI (Tailwind CSS).
            Your task is to implement the necessary changes to solve the following request, strictly adhering to the instructions and constraints in the GEMINI.md file and the issue description.

            # TASK
            ${{ steps.trigger_context.outputs.ai_prompt }}

            # PROJECT CONTEXT
            The existing code structure (Code.gs, WorkflowService.gs, ModuleService.gs, etc.) and the UI (index.html, javascript.html) are part of a merged project.
            The main goal is to integrate all required changes (Tailwind CSS conversion, Drive JSON module loading, API management omission).

            - Always convert legacy styling (MDL/Inline CSS) to Tailwind CSS.
            - Ensure ModuleService dynamically loads JSON definitions from Drive.
            - Omit all API secret management functions.
            
          # PR作成とコミットを自動化
          command: /fix --auto-commit --pr-title "fix: AI implemented changes for issue #${{ steps.trigger_context.outputs.issue_num }}"

      - name: Log Completion
        if: always()
        run: echo "AI Agent run finished."
