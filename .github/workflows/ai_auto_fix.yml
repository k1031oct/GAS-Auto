name: 🤖 Gemini AI Agent Autonomy

on:
  # Issueに特定のラベルが追加されたときにトリガー
  issues:
    types: [labeled]
  # プルリクエストにコメントがついたときにトリガー (@gemini-cliのメンションを監視)
  issue_comment:
    types: [created]
  # gemini-dispatch.yml からの呼び出しを許可する
  workflow_call:
    inputs:
      issue_number:
        type: number
        required: true
      prompt:
        type: string
        required: true

jobs:
  ai_agent_fixer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI Trigger and Set Context
        id: trigger_check
        run: |
          # 初期値を設定
          IS_AI_TRIGGERED="false"
          ISSUE_NUM=""
          AI_TASK_PROMPT=""
          
          # 1. workflow_call (Dispatch) からの実行
          if [ "${{ github.event_name }}" == "workflow_call" ]; then
            IS_AI_TRIGGERED="true"
            ISSUE_NUM="${{ inputs.issue_number }}"
            AI_TASK_PROMPT="${{ inputs.prompt }}"
          
          # 2. ラベルまたはコメントからの直接実行
          else
            # Issue番号の取得 (コメント/ラベルイベントの場合)
            if [ -n "${{ github.event.issue.number }}" ]; then
              ISSUE_NUM="${{ github.event.issue.number }}"
            fi

            # A. ラベル (ready-for-ai) による起動
            if [ "${{ github.event.action }}" == "labeled" ] && [ "${{ github.event.label.name }}" == "ready-for-ai" ]; then
              IS_AI_TRIGGERED="true"
              AI_TASK_PROMPT="Fix the issue described in #${ISSUE_NUM} based on GEMINI.md."
            fi

            # B. コメント (@gemini-cli /fix) による起動
            COMMENT_BODY="${{ github.event.comment.body }}"
            
            if [ "${{ github.event_name }}" == "issue_comment" ] && echo "$COMMENT_BODY" | grep -q "@gemini-cli /fix"; then
              IS_AI_TRIGGERED="true"
              # コメント全体をプロンプトとして使用
              AI_TASK_PROMPT="$COMMENT_BODY"
            fi
          fi
          
          # 出力設定
          echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "AI_TASK_PROMPT=$AI_TASK_PROMPT" >> $GITHUB_OUTPUT
          echo "IS_AI_TRIGGERED=$IS_AI_TRIGGERED" >> $GITHUB_OUTPUT
          
          # トリガーされなければジョブをスキップ
          if [ "$IS_AI_TRIGGERED" == "false" ]; then
            echo "::notice file=ai_auto_fix.yml::No explicit AI trigger detected. Skipping job."
            exit 0
          fi


      - name: Run Gemini CLI for Code Fix
        if: steps.trigger_check.outputs.IS_AI_TRIGGERED == 'true' && secrets.GEMINI_API_KEY
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert Google Apps Script developer specialized in workflow automation and modern web UI (Tailwind CSS).
            Your task is to implement the necessary changes to solve the following request, strictly adhering to the instructions and constraints in the GEMINI.md file and the issue description.

            # TASK
            ${{ steps.trigger_check.outputs.AI_TASK_PROMPT }}

            # PROJECT CONTEXT
            The existing code structure (Code.gs, WorkflowService.gs, ModuleService.gs, etc.) and the UI (index.html, javascript.html) are part of a merged project.
            The main goal is to integrate all required changes (Tailwind CSS conversion, Drive JSON module loading, API management omission).

            - Always convert legacy styling (MDL/Inline CSS) to Tailwind CSS.
            - Ensure ModuleService dynamically loads JSON definitions from Drive.
            - Omit all API secret management functions.
            
          command: /fix --auto-commit --pr-title "fix: AI implemented changes for issue #${{ steps.trigger_check.outputs.ISSUE_NUM }}"

      - name: Log Completion
        if: always()
        run: echo "AI Agent run finished."
