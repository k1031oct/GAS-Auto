name: 🚀 GAS Review Deployment

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code from PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }} 

      - name: Install Clasp and Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp Globally
        run: npm install -g @google/clasp

      - name: Configure Clasp and Credentials
        run: |
          echo "Attempting to configure Clasp..."
          clasp login --creds ${{ secrets.GAS_REFRESH_TOKEN }} --script-id ${{ secrets.GAS_SCRIPT_ID }}
        env:
          HOME: /home/runner

      - name: Deploy to Review Deployment ID
        id: deploy_gas
        run: |
          echo "Deploying to Script ID: ${{ secrets.GAS_SCRIPT_ID }}"
          clasp deploy --deploymentId ${{ secrets.GAS_DEV_DEPLOYMENT_ID }} --description "Review Deployment for PR #${{ github.event.pull_request.number }}"
        env:
          HOME: /home/runner

      - name: Post Review URL as PR Comment
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          # GITHUB_TOKENはユーザーが手動で設定するSecretではありません。
          # GitHub Actionsが実行ごとに自動で生成する、一時的で安全なトークンです。
          # PRへのコメント投稿など、リポジトリ操作のために必要です。
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = `https://script.google.com/macros/s/${{ secrets.GAS_DEV_DEPLOYMENT_ID }}/exec`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
                ## ✨ Review App Deployed (レビュー用アプリがデプロイされました)
                AIエージェントの修正を含むバージョンが、以下のURLで確認可能です。
                
                **レビュー用Webアプリ URL:** [デプロイされたアプリを開く](${deployUrl})
                
                レビュー後、問題がなければPRをマージしてください。
              `
            });
