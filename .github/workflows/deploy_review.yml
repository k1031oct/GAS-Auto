name: 🚀 GAS Review Deployment

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code from PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }} 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create .clasprc.json for Authentication
        run: |
          echo "Creating authentication file..."
          echo '{
            "token": {
              "access_token": "DUMMY_TOKEN_WILL_BE_REFRESHED",
              "refresh_token": "${{ secrets.REFRESH_TOKEN }}",
              "scope": "https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.webapp.deploy https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email",
              "token_type": "Bearer",
              "expiry_date": 1
            },
            "oauth2ClientSettings": {
              "clientId": "${{ secrets.GAS_CLIENT_ID }}",
              "clientSecret": "${{ secrets.GAS_CLIENT_SECRET }}",
              "redirectUri": "http://localhost"
            }
          }' > ~/.clasprc.json
        
      - name: Create .clasp.json for Review Environment
        run: |
          echo Creating .clasp.json pointed to the review script...
          printf '{"scriptId":"%s"}' ${{ secrets.GAS_REVIEW_SCRIPT_ID }} > .clasp.json

      - name: Deploy to Review Environment
        id: deploy_gas
        run: |
          echo "Deploying to Review Script ID: ${{ secrets.GAS_REVIEW_SCRIPT_ID }}"
          clasp deploy --deploymentId ${{ secrets.GAS_DEV_DEPLOYMENT_ID }} --description "Review Deployment for PR #${{ github.event.pull_request.number }}"

      - name: Post Review URL as PR Comment
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = `https://script.google.com/macros/s/${{ secrets.GAS_DEV_DEPLOYMENT_ID }}/exec`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
                ## ✨ Review App Deployed (レビュー用アプリがデプロイされました)
                AIエージェントの修正を含むバージョンが、以下のURLで確認可能です。
                
                **レビュー用Webアプリ URL:** [デプロイされたアプリを開く](${deployUrl})
                
                レビュー後、問題がなければPRをマージしてください。
              `
            });

