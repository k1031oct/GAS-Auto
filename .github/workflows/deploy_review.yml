name: 🚀 GAS Review Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code from PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create .clasp.json for Review Environment
        run: |
          echo "Creating .clasp.json pointed to the review script..."
          if [[ -z "${{ secrets.GAS_SCRIPT_ID }}" ]]; then
            echo "::error::GAS_SCRIPT_ID secret is not set. Please ensure the review script ID is saved under this name."
            exit 1
          fi
          printf '{"scriptId":"%s"}' "${{ secrets.GAS_SCRIPT_ID }}" > .clasp.json
          echo ".clasp.json created successfully."

      - name: Configure Clasp Credentials
        run: |
          echo "Configuring clasp credentials..."
          if [[ -z "${{ secrets.GAS_CLIENT_ID }}" || -z "${{ secrets.GAS_CLIENT_SECRET }}" || -z "${{ secrets.REFRESH_TOKEN }}" ]]; then
            echo "::error::One or more authentication secrets (GAS_CLIENT_ID, GAS_CLIENT_SECRET, REFRESH_TOKEN) are not set."
            exit 1
          fi
          printf '{"token":{"client_id":"%s","client_secret":"%s","refresh_token":"%s","scope":"https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/service.management","token_type":"Bearer","expiry_date":0},"oauth2ClientSettings":{"clientId":"%s","clientSecret":"%s","redirectUri":"http://localhost"}}' \
          "${{ secrets.GAS_CLIENT_ID }}" \
          "${{ secrets.GAS_CLIENT_SECRET }}" \
          "${{ secrets.REFRESH_TOKEN }}" \
          "${{ secrets.GAS_CLIENT_ID }}" \
          "${{ secrets.GAS_CLIENT_SECRET }}" \
          > ~/.clasprc.json
          echo "Credentials configured."

      - name: Push all files to GAS Editor
        run: |
          echo "Pushing all project files to Google Apps Script..."
          clasp push --force
          echo "Push completed successfully."

      - name: Deploy to Review Environment
        id: deploy_gas
        run: |
          echo "Deploying to Review Script ID: ${{ secrets.GAS_SCRIPT_ID }}"
          clasp deploy --deploymentId ${{ secrets.GAS_DEV_DEPLOYMENT_ID }} --description "Review Deployment for PR #${{ github.event.pull_request.number }}"

      - name: Post Review URL as PR Comment
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = `https://script.google.com/macros/s/${{ secrets.GAS_DEV_DEPLOYMENT_ID }}/exec`;
            const prBody = context.payload.pull_request.body;
            const labels = context.payload.pull_request.labels.map(label => label.name);

            let summary;
            if (labels.includes('機能追加')) {
              summary = `
                #### 修正概要（機能追加）
                \`\`\`
                ${prBody}
                \`\`\`
              `;
            } else if (labels.includes('不具合修正')) {
              summary = `
                #### 修正概要（不具合修正）
                \`\`\`
                ${prBody}
                \`\`\`
              `;
            } else {
              // Get the diff of the PR
              const diff_url = context.payload.pull_request.diff_url;
              const result = await github.request(diff_url);
              const diff = result.data;
              summary = `
                #### 修正概要
                \`\`\`diff
                ${diff}
                \`\`\`
              `;
            }

            // Determine the comment title
            const title = context.payload.pull_request.commits > 1 ? '✨ Review App Deployed (Updated)' : '✨ Review App Deployed';

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
                ### ${title}
                AIエージェントの修正を含むバージョンが、以下のURLで確認可能です。
                
                **レビュー用Webアプリ URL:** [デプロイされたアプリを開く](${deployUrl})
                ${summary}
                
                レビュー後、問題がなければPRをマージしてください。
              `
            });

