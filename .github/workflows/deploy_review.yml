name: 🚀 GAS Review Deployment

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code from PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      # --- ここからが重要 ---
      # ワークフロー実行時に、Secretからレビュー用のScript IDを読み込み、
      # 動的に.clasp.jsonファイルを作成します。
      # これにより、リポジトリに.clasp.jsonが存在しなくても安全に動作します。
      - name: Create .clasp.json for Review Environment
        run: |
          echo "Creating .clasp.json pointed to the review script..."
          printf '{"scriptId":"%s"}' "${{ secrets.GAS_REVIEW_SCRIPT_ID }}" > .clasp.json

      - name: Configure Clasp Credentials
        run: |
          echo "Configuring clasp credentials..."
          # ~/.clasprc.json を作成して認証情報を設定
          printf '{"token":{"client_id":"%s","client_secret":"%s","refresh_token":"%s","scope":"https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/service.management","token_type":"Bearer","expiry_date":0},"oauth2ClientSettings":{"clientId":"%s","clientSecret":"%s","redirectUri":"http://localhost"}}' \
          "${{ secrets.GAS_CLIENT_ID }}" \
          "${{ secrets.GAS_CLIENT_SECRET }}" \
          "${{ secrets.REFRESH_TOKEN }}" \
          "${{ secrets.GAS_CLIENT_ID }}" \
          "${{ secrets.GAS_CLIENT_SECRET }}" \
          > ~/.clasprc.json

      - name: Deploy to Review Environment
        id: deploy_gas
        run: |
          echo "Deploying to Review Script ID: ${{ secrets.GAS_REVIEW_SCRIPT_ID }}"
          clasp deploy --deploymentId ${{ secrets.GAS_DEV_DEPLOYMENT_ID }} --description "Review Deployment for PR #${{ github.event.pull_request.number }}"

      - name: Post Review URL as PR Comment
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = `https://script.google.com/macros/s/${{ secrets.GAS_DEV_DEPLOYMENT_ID }}/exec`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
                ## ✨ Review App Deployed
                The version including the AI agent's fixes can be checked at the URL below.
                
                **Review Web App URL:** [Open deployed app](${deployUrl})
                
                After reviewing, please merge the PR if there are no issues.
              `
            });
