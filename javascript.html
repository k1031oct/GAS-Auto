<script>
  // @version 1.1.0
  // --- DOM Elements ---
  const app = {
      // ... (existing elements)
      workflowSelector: document.getElementById('workflow-selector'),
      collapseAllBtn: document.getElementById('collapse-all-btn'),
      expandAllBtn: document.getElementById('expand-all-btn'),
      newWorkflowBtn: document.getElementById('new-workflow-btn'),
      saveWorkflowBtn: document.getElementById('save-workflow-btn'),
      mobileSaveWorkflowBtn: document.getElementById('mobile-save-workflow-btn'),
      deleteWorkflowBtn: document.getElementById('delete-workflow-btn'),
      runBtn: document.getElementById('run-btn'),
      historyBtn: document.getElementById('history-btn'),
      triggerBtn: document.getElementById('trigger-btn'),
      logArea: document.getElementById('log-area'),
      logContent: document.getElementById('log-content'),
      loader: document.getElementById('loader'),
      moduleFolderIdInput: document.getElementById('module-folder-id'),
      reloadModulesBtn: document.getElementById('reload-modules-btn'),
      moduleFolderIdInputMobile: document.getElementById('module-folder-id-mobile'),
      reloadModulesBtnMobile: document.getElementById('reload-modules-btn-mobile'),
      workflowContainer: document.getElementById('workflow-container'),
      modulePalette: document.getElementById('module-palette'),
      moduleList: document.getElementById('module-list'),
                  moduleSearchBox: document.getElementById('module-search-box'),
                  toggleSearchBtn: document.getElementById('toggle-search-btn'),
                  dirtyIndicator: document.getElementById('dirty-indicator'),            resizeHandle: document.getElementById('resize-handle'),
            moduleResizeHandle: document.getElementById('module-resize-handle'),
            customDialog: document.getElementById('custom-dialog'),
            customDialogTitle: document.getElementById('custom-dialog-title'),
            customDialogMessage: document.getElementById('custom-dialog-message'),
            customDialogInput: document.getElementById('custom-dialog-input'),
            customDialogOk: document.getElementById('custom-dialog-ok'),
            customDialogCancel: document.getElementById('custom-dialog-cancel'),
                        showLogBtn: document.getElementById('show-log-btn'),
                        hideLogBtn: document.getElementById('hide-log-btn'),
                        selectionActions: document.getElementById('selection-actions'),
                        groupBtn: document.getElementById('group-btn'),
                        branchBtn: document.getElementById('branch-btn'),
                        moduleSettingsBackdrop: document.getElementById('module-settings-backdrop'),
                        moduleSettingsModal: document.getElementById('module-settings-modal'),
                        moduleSettingsTitle: document.getElementById('module-settings-title'),
                        moduleSettingsDescription: document.getElementById('module-settings-description'),
                        moduleSettingsContent: document.getElementById('module-settings-content'),
                        moduleSettingsSaveBtn: document.getElementById('module-settings-save-btn'),
                        moduleSettingsCancelBtn: document.getElementById('module-settings-cancel-btn'),
                        moduleSettingsCloseBtn: document.getElementById('module-settings-close-btn'),
                        settingsBtn: document.getElementById('settings-btn'),
                        settingsModalBackdrop: document.getElementById('settings-modal-backdrop'),
                        settingsSaveBtn: document.getElementById('settings-save-btn'),
                        settingsCloseBtn: document.getElementById('settings-close-btn'),
                        settingsModuleFolderIdInput: document.getElementById('settings-module-folder-id'),
                        darkModeToggle: document.getElementById('dark-mode-toggle'),
                        createInitialModulesBtn: document.getElementById('create-initial-modules-btn'),
                  
                        // Trigger Modal Elements
                        triggerModalBackdrop: document.getElementById('trigger-modal-backdrop'),
                        triggerModal: document.getElementById('trigger-modal'),
                        triggerCloseBtn: document.getElementById('trigger-close-btn'),
                        triggerCancelBtn: document.getElementById('trigger-cancel-btn'),
                        triggerCreateBtn: document.getElementById('trigger-create-btn'),
                        triggerList: document.getElementById('trigger-list'),
                        triggerType: document.getElementById('trigger-type'),
                        triggerTimeOptions: document.getElementById('trigger-time-options'),
                        triggerHour: document.getElementById('trigger-hour'),
                        archiveBtn: document.getElementById('archive-btn'), // Added for new feature
                        archiveWizardBackdrop: document.getElementById('archive-wizard-backdrop'),
                        archiveWizardContent: document.getElementById('archive-wizard-content'),
                        archiveWizardCloseBtn: document.getElementById('archive-wizard-close-btn'),
                        archiveManagementBackdrop: document.getElementById('archive-management-backdrop'),
                        archiveManagementModal: document.getElementById('archive-management-modal'),
                        archiveManagementContent: document.getElementById('archive-management-content'),
                        archiveManagementCloseBtn: document.getElementById('archive-management-close-btn'),

                        // Hamburger Menu
                        hamburgerBtn: document.getElementById('hamburger-btn'),
                        mobileMenu: document.getElementById('mobile-menu'),
                        mobileNewWorkflowBtn: document.getElementById('mobile-new-workflow-btn'),
                        mobileDeleteWorkflowBtn: document.getElementById('mobile-delete-workflow-btn'),
                        mobileSettingsBtn: document.getElementById('mobile-settings-btn'),
                        mobileTriggerBtn: document.getElementById('mobile-trigger-btn'),
                        mobileHistoryBtn: document.getElementById('mobile-history-btn'),
                        mobileArchiveBtn: document.getElementById('mobile-archive-btn'), // Added for new feature
                                                modulePaletteHeader: document.getElementById('module-palette-header'),
                                                modulePaletteToggleIcon: document.getElementById('module-palette-toggle-icon'),
                                                mobileShowLogBtn: document.getElementById('mobile-show-log-btn'),
                        floatingButtons: document.getElementById('floating-buttons'),
                                              };
                                          
                                              // --- State Management ---
                                              let state = {
                                                // ... (existing state)
                                                currentWorkflowName: '',
                                                modules: [],
                                                selectedInstanceIds: [],
                                                currentModuleFolderId: '',
                                                isDirty: false,
                                                allModuleDefinitions: [],
                                                initialWorkflows: [],
                                                appSettings: {},
                                                logArea: {
                                                  originalHeight: '16rem',
                                                },
                                                modulePalette: {
                                                  isMinimized: true,
                                                  minHeight: '60px', // Header height
                                                }
                                              };
                                          
                                              // ... (existing helper functions: _extractIdFromUrl, showCustomDialog, log, showError, showLoader, hideLoader)
                                              const _extractIdFromUrl = (url) => {
                                                  if (!url) return null;
                                                  const regex1 = /(?:\/d\/|\/folders\/|id=)([a-zA-Z0-9_-]{20,})/;
                                                  const match1 = url.match(regex1);
                                                  if (match1 && match1[1]) {
                                                      return match1[1];
                                                  }
                                                  const regex2 = /\/file\/d\/(.*?)\//;
                                                  const match2 = url.match(regex2);
                                                  if (match2 && match2[1]) {
                                                      return match2[1];
                                                  }
                                                  if (url.length > 20 && !url.includes('/') && !url.includes('.')) {
                                                      return url;
                                                  }
                                                  return null;
                                              };
                                          
                                              const showCustomDialog = (config) => {
                                                return new Promise((resolve) => {
                                                  app.customDialogTitle.textContent = config.title;
                                                  app.customDialogMessage.textContent = config.message;
                                                  app.customDialogInput.classList.add('hidden');
                                                  app.customDialogCancel.classList.remove('hidden');
                                                  if (config.type === 'prompt') {
                                                    app.customDialogInput.classList.remove('hidden');
                                                    app.customDialogInput.value = config.defaultValue || '';
                                                  } else if (config.type === 'alert') {
                                                    app.customDialogCancel.classList.add('hidden');
                                                  }
                                                  const dialogBackdrop = document.getElementById('custom-dialog-backdrop');
                                                  dialogBackdrop.classList.remove('hidden');
                                                  const onOk = () => {
                                                    cleanup();
                                                    resolve(config.type === 'prompt' ? app.customDialogInput.value : true);
                                                  };
                                                  const onCancel = () => {
                                                    cleanup();
                                                    resolve(config.type === 'prompt' ? null : false);
                                                  };
                                                  const cleanup = () => {
                                                    dialogBackdrop.classList.add('hidden');
                                                    app.customDialogOk.removeEventListener('click', onOk);
                                                    app.customDialogCancel.removeEventListener('click', onCancel);
                                                  };
                                                  app.customDialogOk.addEventListener('click', onOk);
                                                  app.customDialogCancel.addEventListener('click', onCancel);
                                                });
                                              };
                                          
                                              const log = (message, type = 'info') => {
                                                const timestamp = new Date().toLocaleTimeString();
                                                let color = 'text-gray-300';
                                                if (type === 'error') color = 'text-red-400';
                                                if (type === 'success') color = 'text-green-400';
                                                if (type === 'system') color = 'text-yellow-400';
                                                app.logContent.innerHTML += `<div class="${color}"><span class="text-gray-500">${timestamp}</span> ${message}</div>`;
                                                app.logContent.scrollTop = app.logContent.scrollHeight;
                                              };
                                              
                                              const showError = (error) => {
                                                log(`エラー: ${error.message || error}`, 'error');
                                                hideLoader();
                                              };
                                              
                                              const showLoader = () => app.loader.classList.remove('hidden');
                                              const hideLoader = () => app.loader.classList.add('hidden');

                                              // --- Archive Management Logic ---
                                              const openArchiveManagement = () => {
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler(response => {
                                                    hideLoader();
                                                    app.archiveManagementContent.innerHTML = response.html;
                                                    app.archiveManagementBackdrop.classList.remove('hidden');
                                                    // Execute scripts in the injected HTML
                                                    const scripts = app.archiveManagementContent.getElementsByTagName('script');
                                                    for (let i = 0; i < scripts.length; i++) {
                                                      eval(scripts[i].innerHTML);
                                                    }
                                                  })
                                                  .withFailureHandler(showError)
                                                  .showArchiveManagement();
                                              };

                                              const closeArchiveManagement = () => {
                                                app.archiveManagementBackdrop.classList.add('hidden');
                                                app.archiveManagementContent.innerHTML = '';
                                              };

                                              // --- Archive Wizard Logic ---
                                              const openArchiveWizard = () => {
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler((response) => {
                                                    hideLoader();
                                                    // First, close the management modal if it's open
                                                    closeArchiveManagement();
                                                    // Then, show the wizard
                                                    app.archiveWizardContent.innerHTML = response.html;
                                                    app.archiveWizardBackdrop.classList.remove('hidden');
                                                  })
                                                  .withFailureHandler(showError)
                                                  .showArchiveWizard();
                                              };

                                              const closeArchiveWizard = () => {
                                                app.archiveWizardBackdrop.classList.add('hidden');
                                                app.archiveWizardContent.innerHTML = ''; // Clear content
                                                // Re-open the management modal after closing the wizard
                                                openArchiveManagement();
                                              };
                                          
                                              // --- Trigger Modal Logic ---
                                              const openTriggerModal = () => {
                                                if (!state.currentWorkflowName) {
                                                  showCustomDialog({ title: 'エラー', message: 'トリガーを設定する前に、ワークフローを保存してください。', type: 'alert' });
                                                  return;
                                                }
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler(triggers => {
                                                    hideLoader();
                                                    renderTriggers(triggers);
                                                    app.triggerModalBackdrop.classList.remove('hidden');
                                                  })
                                                  .withFailureHandler(showError)
                                                  .getTriggersForWorkflow(state.currentWorkflowName);
                                              };
                                          
                                              const closeTriggerModal = () => {
                                                app.triggerModalBackdrop.classList.add('hidden');
                                              };
                                          
                                              const renderTriggers = (triggers) => {
                                                app.triggerList.innerHTML = '';
                                                if (triggers.length === 0) {
                                                  app.triggerList.innerHTML = '<p class="text-sm text-gray-500">このワークフローのトリガーはありません。</p>';
                                                  return;
                                                }
                                                triggers.forEach(trigger => {
                                                  const triggerEl = document.createElement('div');
                                                  triggerEl.className = 'p-2 border rounded-lg flex justify-between items-center dark:bg-gray-700 dark:border-gray-600';
                                                  triggerEl.innerHTML = `
                                                    <div>
                                                      <p class="font-mono text-sm dark:text-gray-200">${trigger.eventType}</p>
                                                      <p class="text-xs text-gray-500 dark:text-gray-400">ID: ${trigger.uid}</p>
                                                    </div>
                                                    <button data-uid="${trigger.uid}" class="delete-trigger-btn p-2 text-red-500 hover:text-red-700 dark:hover:text-red-400" title="削除"><i class="fas fa-trash pointer-events-none"></i></button>
                                                  `;
                                                  app.triggerList.appendChild(triggerEl);
                                                });
                                          
                                                app.triggerList.querySelectorAll('.delete-trigger-btn').forEach(btn => {
                                                  btn.addEventListener('click', (e) => handleDeleteTrigger(e.currentTarget.dataset.uid));
                                                });
                                              };
                                          
                                              const handleDeleteTrigger = async (uid) => {
                                                const confirmed = await showCustomDialog({ title: '確認', message: `本当にこのトリガー (ID: ${uid}) を削除しますか？`, type: 'confirm' });
                                                if (!confirmed) return;
                                          
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler(message => {
                                                    log(message, 'success');
                                                    openTriggerModal(); // Refresh the list
                                                  })
                                                  .withFailureHandler(showError)
                                                  .deleteTrigger(uid);
                                              };
                                          
                                              const handleCreateTrigger = () => {
                                                const options = {
                                                  type: app.triggerType.value,
                                                  hour: parseInt(app.triggerHour.value, 10),
                                                  // Add more options for other types here
                                                };
                                          
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler(message => {
                                                    log(message, 'success');
                                                    openTriggerModal(); // Refresh the list
                                                  })
                                                  .withFailureHandler(showError)
                                                  .createTimeBasedTrigger(state.currentWorkflowName, options);
                                              };
                                              
                                              const onAddModule = (evt, targetModuleArray) => {
                                                console.log('onAddModule called.');
                                                const item = evt.item; // The cloned element from the palette
                                                const draggedModuleId = item.dataset.moduleId;
                                                const moduleDef = state.allModuleDefinitions.find(m => m.id === draggedModuleId);
                        
                                                if (moduleDef) {
                                                    // 1. Create the new data object for the state
                                                    const newModuleData = {
                                                        id: draggedModuleId,
                                                        instanceId: `${draggedModuleId}_${Date.now()}_${Math.random().toString(36).substring(2, 6)}`,
                                                        name: moduleDef.name,
                                                        type: moduleDef.type,
                                                        settings: {}
                                                    };
                                                    // If the module is a container, initialize its branch arrays.
                                                    if (moduleDef.type === 'container') {
                                                      if (moduleDef.branches && moduleDef.branches.length > 0) {
                                                        moduleDef.branches.forEach(branch => {
                                                          newModuleData[branch.id] = [];
                                                        });
                                                      } else {
                                                        // Fallback for older container definitions
                                                        newModuleData.modules = [];
                                                      }
                                                    }
                                                    
                                                    // Initialize default settings
                                                    if (moduleDef.settings) {
                                                      moduleDef.settings.forEach(setting => {
                                                        if (setting.defaultValue !== undefined) {
                                                          newModuleData.settings[setting.id] = setting.defaultValue;
                                                        }
                                                      });
                                                    }
                        
                                                    // 2. Add the new data to the state array at the correct position
                                                    targetModuleArray.splice(evt.newIndex, 0, newModuleData);
                        
                                                    // 3. Create the real, properly-styled module element
                                                    const moduleEl = createModuleElement(newModuleData, targetModuleArray);
                        
                                                    // 4. Replace the cloned palette item with the real module element
                                                    item.replaceWith(moduleEl);
                                                    
                                                    // If this was the first module in the main container, remove the placeholder text
                                                    if (state.modules.length === 1 && targetModuleArray === state.modules) {
                                                        const placeholder = app.workflowContainer.querySelector('.workflow-guide');
                                                        if(placeholder) placeholder.remove();
                                                    }
                        
                                                    markDirty();
                                                    console.log('  Module added. Current state.modules.length:', state.modules.length);
                                                    setTimeout(drawConnectors, 50);
                                                }
                                              };
                        
                                              const onUpdateModuleOrder = (evt, targetModuleArray) => {
                                                  // Handle re-ordering of modules
                                                  const movedItem = targetModuleArray.splice(evt.oldIndex, 1)[0];
                                                  targetModuleArray.splice(evt.newIndex, 0, movedItem);
                                                  markDirty();
                                                  setTimeout(drawConnectors, 50);
                                              };

                                              const saveWorkflow = async () => {
                                                  let workflowName = state.currentWorkflowName;
                                                  if (!workflowName) {
                                                      workflowName = await showCustomDialog({ title: 'ワークフロー名の入力', message: 'ワークフロー名を入力してください:', type: 'prompt' });
                                                      if (!workflowName) return;
                                                  }
                                                  const workflowData = getWorkflowData();
                                                  showLoader();
                                                  google.script.run
                                                      .withSuccessHandler(response => {
                                                          state.currentWorkflowName = workflowName;
                                                          state.isDirty = false;
                                                          loadWorkflows();
                                                          setTimeout(() => {
                                                            app.workflowSelector.value = workflowName;
                                                            drawConnectors();
                                                          }, 100);
                                                          hideLoader();
                                                          log(response, 'success');
                                                      })
                                                      .withFailureHandler(showError)
                                                      .saveWorkflow(workflowName, workflowData);
                                              };
                        
                                              const setCollapseStateRecursive = (modules, isCollapsed) => {
                                                modules.forEach(module => {
                                                  module.isCollapsed = isCollapsed;
                                                  if (module.type === 'container') {
                                                    if (module.branches) {
                                                      module.branches.forEach(branch => {
                                                        if (module[branch.id]) {
                                                          setCollapseStateRecursive(module[branch.id], isCollapsed);
                                                        }
                                                      });
                                                    }
                                                    if (module.modules) {
                                                      setCollapseStateRecursive(module.modules, isCollapsed);
                                                    }
                                                  }
                                                });
                                              };
                        
                                              const updateSelectionActionsUI = () => {
                                                console.log('updateSelectionActionsUI called.');
                                                const count = state.selectedInstanceIds.length;
                                                const hasModules = state.modules.length > 0;
                                                console.log(`  Selected modules count: ${count}, Has modules: ${hasModules}`);
                                                if (count === 0 || !hasModules) {
                                                  app.selectionActions.classList.add('hidden');
                                                  console.log('  Hiding selection actions.');
                                                } else {
                                                  app.selectionActions.classList.remove('hidden');
                                                  console.log('  Showing selection actions.');
                                                  app.groupBtn.classList.toggle('hidden', count < 2);
                                                  app.branchBtn.classList.toggle('hidden', count !== 1);
                                                  console.log(`  Group button hidden: ${app.groupBtn.classList.contains('hidden')}, Branch button hidden: ${app.branchBtn.classList.contains('hidden')}`);
                                                }
                                              };
                        
                                              // --- initEventListeners ---
                                              const initEventListeners = () => {
                                                  // Init SortableJS for workflow container (drop target)
                                                  new Sortable(app.workflowContainer, {
                                                      group: 'shared',
                                                      animation: 150,
                                                      handle: '.handle',
                                                      onAdd: (evt) => onAddModule(evt, state.modules),
                                                      onUpdate: (evt) => onUpdateModuleOrder(evt, state.modules),
                                                      filter: 'button, input, select, textarea, label', // Ignore clicks on form elements and buttons
                                                      preventOnFilter: false
                                                  });

                                                app.workflowContainer.addEventListener('click', (e) => {
                                                  if (e.target === app.workflowContainer) {
                                                    state.selectedInstanceIds = [];
                                                    renderModules();
                                                    updateSelectionActionsUI();
                                                  }
                                                });

                                                app.groupBtn.addEventListener('click', () => {
                                                  if (state.selectedInstanceIds.length < 2) return;
                        
                                                  const groupModuleDef = state.allModuleDefinitions.find(m => m.id === 'group_container') || {
                                                    id: 'group_container',
                                                    name: 'グループ化',
                                                    description: '複数のモジュールをまとめるコンテナです。',
                                                    icon: 'fa-object-group',
                                                    type: 'container',
                                                    settings: [
                                                      { id: 'groupTitle', name: 'グループタイトル', type: 'text', defaultValue: '新しいグループ' }
                                                    ]
                                                  };
                        
                                                  // Add this definition to the list if it doesn't exist, so it can be rendered
                                                  if (!state.allModuleDefinitions.find(m => m.id === groupModuleDef.id)) {
                                                    state.allModuleDefinitions.push(groupModuleDef);
                                                  }
                        
                                                  const newGroupModule = {
                                                    id: groupModuleDef.id,
                                                    instanceId: `${groupModuleDef.id}_${Date.now()}`,
                                                    name: groupModuleDef.name,
                                                    type: groupModuleDef.type,
                                                    settings: { groupTitle: '新しいグループ' },
                                                    modules: [] // This will hold the selected modules
                                                  };
                        
                                                  let insertionPoint = null; // { parentArray: Array, index: number }
                                                  const extractedModules = [];
                        
                                                  // Recursive function to find and remove selected modules
                                                  const findAndExtractSelected = (moduleArray) => {
                                                    for (let i = moduleArray.length - 1; i >= 0; i--) {
                                                      const module = moduleArray[i];
                                                      if (state.selectedInstanceIds.includes(module.instanceId)) {
                                                        // Found a selected module, extract it
                                                        const [extracted] = moduleArray.splice(i, 1);
                                                        extractedModules.unshift(extracted); // Add to start to maintain order
                                                        // Record the position of the *first* selected item found
                                                        insertionPoint = { parentArray: moduleArray, index: i };
                                                      } else if (module.type === 'container') {
                                                        if (module.branches) {
                                                          module.branches.forEach(branch => {
                                                            if(module[branch.id]) findAndExtractSelected(module[branch.id]);
                                                          });
                                                        }
                                                        if (module.modules) {
                                                          findAndExtractSelected(module.modules);
                                                        }
                                                      }
                                                    }
                                                  };
                        
                                                  findAndExtractSelected(state.modules);
                        
                                                  if (insertionPoint) {
                                                    // Add the extracted modules into the new group
                                                    newGroupModule.modules = extractedModules;
                                                    // Insert the new group at the recorded position
                                                    insertionPoint.parentArray.splice(insertionPoint.index, 0, newGroupModule);
                                                  }
                        
                                                  // Clean up and re-render
                                                  state.selectedInstanceIds = [];
                                                  markDirty();
                                                  renderModules();
                                                  updateSelectionActionsUI();
                                                });
                        
                                                app.branchBtn.addEventListener('click', () => {
                                                  if (state.selectedInstanceIds.length !== 1) return;
                                                  const selectedInstanceId = state.selectedInstanceIds[0];
                        
                                                  const branchModuleDef = state.allModuleDefinitions.find(m => m.id === 'condition_branch');
                                                  if (!branchModuleDef) {
                                                    console.error('condition_branch module definition not found!');
                                                    return;
                                                  }
                        
                                                  const newBranchModule = {
                                                    id: branchModuleDef.id,
                                                    instanceId: `${branchModuleDef.id}_${Date.now()}`,
                                                    name: branchModuleDef.name,
                                                    type: branchModuleDef.type,
                                                    settings: {},
                                                  };
                                                  // Initialize branch arrays dynamically
                                                  if (branchModuleDef.branches) {
                                                    branchModuleDef.branches.forEach(branch => {
                                                      newBranchModule[branch.id] = [];
                                                    });
                                                  }
                        
                                                  let foundModuleInfo = null;
                        
                                                  const findModuleAndGetSiblings = (moduleArray) => {
                                                    for (let i = 0; i < moduleArray.length; i++) {
                                                      const module = moduleArray[i];
                                                      if (module.instanceId === selectedInstanceId) {
                                                        foundModuleInfo = { parentArray: moduleArray, index: i };
                                                        return;
                                                      }
                                                      if (module.type === 'container' && module.branches) {
                                                        module.branches.forEach(branch => {
                                                          if (module[branch.id]) {
                                                            findModuleAndGetSiblings(module[branch.id]);
                                                            if (foundModuleInfo) return;
                                                          }
                                                        });
                                                      } else if (module.type === 'container' && module.modules) {
                                                        findModuleAndGetSiblings(module.modules);
                                                        if (foundModuleInfo) return;
                                                      }
                                                    }
                                                  };
                        
                                                  findModuleAndGetSiblings(state.modules);
                        
                                                  if (foundModuleInfo) {
                                                    const { parentArray, index } = foundModuleInfo;
                                                    const subsequentModules = parentArray.splice(index + 1);
                                                    // By default, move subsequent modules to the first defined branch (e.g., 'true_modules')
                                                    const firstBranchId = branchModuleDef.branches[0]?.id;
                                                    if (firstBranchId) {
                                                      newBranchModule[firstBranchId] = subsequentModules;
                                                    }
                                                    parentArray.splice(index + 1, 0, newBranchModule);
                                                  }
                        
                                                  state.selectedInstanceIds = [];
                                                  markDirty();
                                                  renderModules();
                                                  updateSelectionActionsUI();
                                                });

                                                app.collapseAllBtn.addEventListener('click', () => {
                                                  setCollapseStateRecursive(state.modules, true);
                                                  renderModules();
                                                });
                                                app.expandAllBtn.addEventListener('click', () => {
                                                  setCollapseStateRecursive(state.modules, false);
                                                  renderModules();
                                                });
                                          
                                                // Trigger Modal Listeners
                                                app.triggerBtn.addEventListener('click', openTriggerModal);
                                                app.triggerCloseBtn.addEventListener('click', closeTriggerModal);
                                                app.triggerCancelBtn.addEventListener('click', closeTriggerModal);
                                                app.triggerCreateBtn.addEventListener('click', handleCreateTrigger);

                                                // Archive Listeners
                                                app.archiveBtn.addEventListener('click', openArchiveManagement);
                                                app.archiveWizardCloseBtn.addEventListener('click', closeArchiveWizard);
                                                app.archiveManagementCloseBtn.addEventListener('click', closeArchiveManagement);

                                          
                                                app.hideLogBtn.addEventListener('click', hideLog);
                                                app.showLogBtn.addEventListener('click', showLog);
                                          
                                                // Search Logic
                                                app.toggleSearchBtn.addEventListener('click', (e) => {
                                                  e.stopPropagation(); // Prevent header click from firing
                                                  app.moduleSearchBox.classList.toggle('hidden');
                                                  if (!app.moduleSearchBox.classList.contains('hidden')) {
                                                    app.moduleSearchBox.focus();
                                                  }
                                                });
                                          
                                                app.moduleSearchBox.addEventListener('input', (e) => {

                                                app.runBtn.addEventListener('click', () => {

                                              // ... (rest of the functions: handleWorkflowSelect, newWorkflow, deleteModule, loadWorkflows, etc.)
                                              // All other functions remain the same as the previous version.
                                              // This is a simplified representation to show where the new logic is added.
                                              // The full content of the file will be written.
                                              const updateUI = () => {
                                                console.log('updateUI called.');
                                                const hasModules = state.modules.length > 0;
                                                console.log(`  Has modules: ${hasModules}`);
                                                app.runBtn.disabled = !hasModules;
                                                app.expandAllBtn.classList.toggle('hidden', !hasModules);
                                                app.collapseAllBtn.classList.toggle('hidden', !hasModules);
                                                console.log(`  Expand All button hidden: ${app.expandAllBtn.classList.contains('hidden')}, Collapse All button hidden: ${app.collapseAllBtn.classList.contains('hidden')}`);

                                                app.deleteWorkflowBtn.disabled = !state.currentWorkflowName;
                                                app.mobileDeleteWorkflowBtn.disabled = !state.currentWorkflowName;
                                                app.moduleFolderIdInput.value = state.currentModuleFolderId;

                                              const markDirty = () => {
                                                state.isDirty = true;
                                                updateUI();
                                              };
                                              
                                              const openSettingsModal = () => {
                                                app.settingsModuleFolderIdInput.value = state.appSettings.moduleFolderId || '';
                                                app.darkModeToggle.checked = state.appSettings.darkMode;
                                                app.settingsModalBackdrop.classList.remove('hidden');

                                              const closeSettingsModal = () => {
                                                app.settingsModalBackdrop.classList.add('hidden');
                                              };
                                          
                                              const saveSettings = () => {
                                                const rawFolderId = app.settingsModuleFolderIdInput.value.trim();
                                                const folderId = _extractIdFromUrl(rawFolderId);
                                                const settings = {
                                                  moduleFolderId: folderId,
                                                  darkMode: app.darkModeToggle.checked,
                                                };
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler((savedSettings) => {
                                                    log('設定を保存しました。', 'success');
                                                    state.appSettings = savedSettings;
                                                    applySettings(savedSettings);
                                                    state.currentModuleFolderId = folderId;
                                                    app.moduleFolderIdInput.value = folderId;
                                                    app.moduleFolderIdInputMobile.value = folderId;
                                                    hideLoader();
                                                    closeSettingsModal();

                                                  .withFailureHandler(showError)
                                                  .saveSettings(settings);
                                              };
                                          
                                              const handleCreateInitialModules = () => {
                                                const rawFolderId = app.settingsModuleFolderIdInput.value.trim();
                                                const folderId = _extractIdFromUrl(rawFolderId);
                                                if (!folderId) {
                                                  showError({ message: 'モジュール保管用フォルダIDが入力されていません。' });
                                                  return;
                                                }
                                                showLoader();
                                                google.script.run
                                                  .withSuccessHandler((result) => {
                                                    log(result, 'success');
                                                    loadModuleDefinitionsFromDrive(); 
                                                    hideLoader();
                                                  })
                                                  .withFailureHandler(showError)
                                                  .createInitialModules(folderId);
                                              };
                                              
                                              const applySettings = (settings) => {
                                                  if (settings.darkMode) {
                                                      document.documentElement.classList.add('dark');
                                                  } else {
                                                      document.documentElement.classList.remove('dark');
                                                  }
                                              };
                                          
                                              const debounce = (func, delay) => {
                                                let timeout;
                                                return (...args) => {
                                                  clearTimeout(timeout);
                                                  timeout = setTimeout(() => func.apply(this, args), delay);
                                                };
                                              };
                                          
                                              const drawConnectors = () => {
                                                const svg = document.getElementById('connector-svg');
                                                const container = app.workflowContainer;
                                                if (!svg || !container) return;
                                            
                                                svg.innerHTML = ''; // Clear existing connectors
                                            
                                                const containerRect = container.getBoundingClientRect();
                                            
                                                const getModuleEndpoints = (moduleEl) => {
                                                  if (!moduleEl) return null;
                                                  const rect = moduleEl.getBoundingClientRect();
                                                  return {
                                                    top: { x: rect.left + rect.width / 2 - containerRect.left, y: rect.top - containerRect.top },
                                                    bottom: { x: rect.left + rect.width / 2 - containerRect.left, y: rect.bottom - containerRect.top },
                                                  };
                                                };
                                            
                                                const createPath = (d, isBranch = false) => {
                                                  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                                                  path.setAttribute('d', d);
                                                  path.setAttribute('stroke', isBranch ? '#F59E0B' : '#9CA3AF'); // amber-500 for branch, gray-400 for normal
                                                  path.setAttribute('stroke-width', '2');
                                                  path.setAttribute('fill', 'none');
                                                  if (isBranch) {
                                                    path.setAttribute('stroke-dasharray', '4 4');
                                                  }
                                                  return path;
                                                };
                                            
                                                const createBranchIcon = (x, y, module) => {
                                                  const iconGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                                                  iconGroup.style.cursor = 'pointer';
                                            
                                                  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                                                  circle.setAttribute('cx', x);
                                                  circle.setAttribute('cy', y);
                                                  circle.setAttribute('r', '12');
                                                  circle.setAttribute('fill', '#F59E0B'); // amber-500
                                            
                                                  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                                                  text.setAttribute('x', x);
                                                  text.setAttribute('y', y + 1);
                                                  text.setAttribute('fill', 'white');
                                                  text.setAttribute('font-size', '14');
                                                  text.setAttribute('text-anchor', 'middle');
                                                  text.setAttribute('dominant-baseline', 'middle');
                                                  text.setAttribute('font-family', 'FontAwesome');
                                                  text.innerHTML = '&#xf126;'; // fa-code-branch
                                            
                                                  iconGroup.appendChild(circle);
                                                  iconGroup.appendChild(text);
                                            
                                                  iconGroup.addEventListener('click', (e) => {
                                                    e.stopPropagation();
                                                    console.log('Branch icon clicked for module:', module.instanceId);
                                                    // Here you would open a modal for setting the condition
                                                    showCustomDialog({
                                                      title: '条件設定',
                                                      message: `モジュール「${module.name}」の分岐条件を入力してください:`,
                                                      type: 'prompt',
                                                      defaultValue: module.settings.condition || ''
                                                    }).then(condition => {
                                                      if (condition !== null) {
                                                        module.settings.condition = condition;
                                                        markDirty();
                                                        renderModules(); // Re-render to show new condition text
                                                      }
                                                    });
                                                  });
                                            
                                                  return iconGroup;
                                                };
                                            
                                                const drawNested = (modules) => {
                                                  for (let i = 0; i < modules.length - 1; i++) {
                                                    const currentModule = modules[i];
                                                    const nextModule = modules[i + 1];
                                                    const currentEl = container.querySelector(`[data-id="${currentModule.instanceId}"]`);
                                                    const nextEl = container.querySelector(`[data-id="${nextModule.instanceId}"]`);
                                            
                                                    if (currentEl && nextEl) {
                                                      const start = getModuleEndpoints(currentEl).bottom;
                                                      const end = getModuleEndpoints(nextEl).top;
                                                      const d = `M ${start.x} ${start.y} C ${start.x} ${start.y + 30}, ${end.x} ${end.y - 30}, ${end.x} ${end.y}`;
                                                      svg.appendChild(createPath(d));
                                                    }
                                                  }
                                            
                                                  modules.forEach(module => {
                                                    if (module.type === 'container') {
                                                      const containerEl = container.querySelector(`[data-id="${module.instanceId}"]`);
                                                      if (!containerEl) return;
                                            
                                                      const moduleDef = state.allModuleDefinitions.find(d => d.id === module.id);
                                                      if (moduleDef && moduleDef.branches) {
                                                        // Branching logic
                                                        const startPoint = getModuleEndpoints(containerEl).bottom;
                                                        const branchContainer = containerEl.querySelector('.branch-container');
                                                        if (!branchContainer) return;
                                            
                                                        const branchRect = branchContainer.getBoundingClientRect();
                                                        const midY = startPoint.y + 40;
                                            
                                                        // Draw main vertical line down
                                                        const mainLineDown = `M ${startPoint.x} ${startPoint.y} L ${startPoint.x} ${midY}`;
                                                        svg.appendChild(createPath(mainLineDown, true));
                                            
                                                        // Add branch icon
                                                        const icon = createBranchIcon(startPoint.x, midY, module);
                                                        svg.appendChild(icon);
                                            
                                                        moduleDef.branches.forEach(branch => {
                                                          const branchModules = module[branch.id] || [];
                                                          if (branchModules.length > 0) {
                                                            const firstModuleInBranch = container.querySelector(`[data-id="${branchModules[0].instanceId}"]`);
                                                            if (firstModuleInBranch) {
                                                              const endPoint = getModuleEndpoints(firstModuleInBranch).top;
                                                              // Draw horizontal and vertical lines to the branch
                                                              const d = `M ${startPoint.x} ${midY} L ${endPoint.x} ${midY} L ${endPoint.x} ${endPoint.y}`;
                                                              svg.appendChild(createPath(d, true));
                                                            }
                                                          }
                                                          drawNested(branchModules);
                                                        });
                                                      } else if (module.modules) {
                                                        // Standard container logic
                                                        drawNested(module.modules);
                                                      }
                                                    }
                                                  });
                                                };
                                            
                                                drawNested(state.modules);
                                              };

                                              const renderModules = () => {
                                                app.workflowContainer.innerHTML = ''; // Clear the container first
                                            
                                                if (state.modules.length === 0) {
                                                    app.workflowContainer.innerHTML = `<div class="text-center text-gray-500 p-4 md:p-8 workflow-guide">
                                                        <i class="fas fa-arrow-up text-3xl md:text-4xl mb-3 text-gray-300"></i>
                                                        <p class="text-sm md:text-base">下部のライブラリからモジュールをドラッグ＆ドロップしてください。</p>
                                                        <p class="text-xs md:text-sm mt-2">（ファイル整理機能は、モジュール「ドライブ操作」などに統合されています）</p>
                                                    </div>`;
                                                    return;
                                                }
                                            
                                                // Recursive function to create the module tree
                                                const createModuleTree = (modules, parentElement, parentModuleArray) => {
                                                    modules.forEach((module, index) => {
                                                        const moduleEl = createModuleElement(module, parentModuleArray);
                                                        parentElement.appendChild(moduleEl);
                                            
                                                        if (module.type === 'container') {
                                                            const moduleDef = state.allModuleDefinitions.find(d => d.id === module.id);
                                                            if (moduleDef && moduleDef.branches) {
                                                              // Dynamic branch logic for containers like 'condition_branch'
                                                              moduleDef.branches.forEach(branch => {
                                                                const containerEl = moduleEl.querySelector(`.${branch.id}-dropzone`);
                                                                if (containerEl) {
                                                                  new Sortable(containerEl, {
                                                                    group: 'shared', animation: 150, handle: '.handle',
                                                                    onAdd: (evt) => onAddModule(evt, module[branch.id]),
                                                                    onUpdate: (evt) => onUpdateModuleOrder(evt, module[branch.id])
                                                                  });
                                            
                                                                  if (module[branch.id] && module[branch.id].length > 0) {
                                                                    createModuleTree(module[branch.id], containerEl, module[branch.id]);
                                                                  } else {
                                                                    containerEl.innerHTML = `<div class="text-center text-xs text-gray-400 p-2 workflow-guide">ここにモジュールをドラッグ</div>`;
                                                                  }
                                                                }
                                                              });
                                                            } else {
                                                              // Standard container logic for containers like 'group_container'
                                                              const containerContent = moduleEl.querySelector('.module-container-content');
                                                              if (containerContent) {
                                                                new Sortable(containerContent, {
                                                                  group: 'shared', animation: 150, handle: '.handle',
                                                                  onAdd: (evt) => onAddModule(evt, module.modules),
                                                                  onUpdate: (evt) => onUpdateModuleOrder(evt, module.modules)
                                                                });
                                            
                                                                if (module.modules && module.modules.length > 0) {
                                                                  createModuleTree(module.modules, containerContent, module.modules);
                                                                } else {
                                                                  containerContent.innerHTML = `<div class="text-center text-xs text-gray-400 p-4 workflow-guide">ここにモジュールをドラッグ</div>`;
                                                                }
                                                              }
                                                            }
                                                        }
                                                    });
                                                };
                                            
                                                // Start rendering from the root level
                                                createModuleTree(state.modules, app.workflowContainer, state.modules);
                                                
                                                // Use a timeout to ensure the DOM has been updated before drawing connectors
                                                setTimeout(drawConnectors, 50);
                                              };
                                          
                                              const createModuleElement = (module, parentModuleArray) => {
                                                  const moduleEl = document.createElement('div');
                                                  const isEnabled = module.enabled !== false;
                                                  const isCollapsed = module.isCollapsed === true;
                                                  const isSelected = state.selectedInstanceIds.includes(module.instanceId);
                                                  const moduleDef = state.allModuleDefinitions.find(d => d.id === module.id) || { name: '不明なモジュール', icon: 'fa-question-circle', settings: [] };
                                                  
                                                  moduleEl.className = `bg-white p-3 rounded-lg shadow border border-gray-200 ${!isEnabled ? 'opacity-60' : ''} ${isSelected ? 'module-selected' : ''} dark:bg-gray-800 dark:border-gray-700 max-w-3xl mx-auto`;
                                                  moduleEl.dataset.id = module.instanceId;
                                                  moduleEl.dataset.moduleId = module.id;
                                          
                                                  let settingsHTML = '';
                                                  if (moduleDef.settings && moduleDef.settings.length > 0) {
                                                      settingsHTML += `<div class="module-settings-grid grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">`;
                                                      moduleDef.settings.forEach(setting => {
                                                          const currentValue = module.settings[setting.id] || setting.defaultValue || '';
                                                          settingsHTML += `<div class="setting-field">`;
                                                          settingsHTML += `<label for="setting-${module.instanceId}-${setting.id}" class="block text-sm font-bold text-gray-700 mb-1 dark:text-gray-200">${setting.name}</label>`;
                                                          
                                                          switch (setting.type) {
                                                              case 'text':
                                                              case 'number':
                                                                  settingsHTML += `<input type="${setting.type}" id="setting-${module.instanceId}-${setting.id}" data-setting-id="${setting.id}" value="${currentValue}" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 shadow-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="${setting.placeholder || ''}">`;
                                                                  break;
                                                              case 'textarea':
                                                                  settingsHTML += `<textarea id="setting-${module.instanceId}-${setting.id}" data-setting-id="${setting.id}" rows="3" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 shadow-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="${setting.placeholder || ''}">${currentValue}</textarea>`;
                                                                  break;
                                                              case 'select':
                                                                  if (Array.isArray(setting.options)) {
                                                                    const options = setting.options.map(opt => `<option value="${opt.value}" ${currentValue === opt.value ? 'selected' : ''}>${opt.label}</option>`).join('');
                                                                    settingsHTML += `<select id="setting-${module.instanceId}-${setting.id}" data-setting-id="${setting.id}" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 shadow-sm bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white">${options}</select>`;
                                                                  }
                                                                  break;
                                                              case 'checkbox':
                                                                  settingsHTML += `<label class="flex items-center mt-2"><input type="checkbox" id="setting-${module.instanceId}-${setting.id}" data-setting-id="${setting.id}" ${currentValue ? 'checked' : ''} class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"> <span class="ml-2 text-gray-700 dark:text-gray-300">${setting.label || ''}</span></label>`;
                                                                  break;
                                                          }
                                                          if (setting.description) {
                                                              settingsHTML += `<p class="text-xs text-gray-500 mt-1 dark:text-gray-400">${setting.description}</p>`;
                                                          }
                                                          settingsHTML += `</div>`;
                                                      });
                                                      settingsHTML += '</div>';
                                                  }
                        
                                                              let titleDisplay = moduleDef.name;
                                                              if (module.id === 'group_container' && module.settings.groupTitle) {
                                                                titleDisplay += `: <span class="font-normal text-gray-600 dark:text-gray-400">${module.settings.groupTitle}</span>`;
