                                                                titleDisplay += `: <span class="font-mono text-sm text-blue-600 dark:text-blue-400">${module.settings.condition}</span>`;
                                                              }
                        
                                                              let containerHTML = '';
                                                              if (module.type === 'container') {
                                                                  const moduleDef = state.allModuleDefinitions.find(d => d.id === module.id);
                                                                  if (moduleDef && moduleDef.branches) {
                                                                    // Dynamic branch container for modules like 'condition_branch'
                                                                    containerHTML += `<div class="branch-container mt-3 pt-3 border-t border-dashed border-gray-300 dark:border-gray-600 grid grid-cols-${moduleDef.branches.length} gap-4">`;
                                                                    moduleDef.branches.forEach(branch => {
                                                                      containerHTML += `
                                                                        <div class="branch-${branch.id}">

                                                                          <div class="module-container-content ${branch.id}-dropzone bg-gray-50 dark:bg-gray-900/20 p-2 rounded-lg min-h-[60px] border-2 border-dashed border-gray-300 dark:border-gray-600 space-y-2"></div>
                                                                        </div>
                                                                      `;
                                                                    });
                                                                    containerHTML += `</div>`;
                                                                  } else {
                                                                    // Standard container for modules like 'group_container'
                                                                    containerHTML += `<div class="module-container-content mt-3 pt-3 border-t border-dashed border-gray-300 dark:border-gray-600 space-y-2 min-h-[50px]"></div>`;
                                                                  }
                                                              }
                        
                                                              const contentHTML = `
                                                                <div class="flex items-center gap-3">
                                                                    <div class="flex-shrink-0">
                                                                      <i class="fas fa-grip-vertical text-gray-400 cursor-grab handle"></i>

                                                                        <div class="flex justify-between items-center">
                                                                            <div class="flex items-center gap-3">
                                                                                <i class="fas ${moduleDef.icon || 'fa-extension'} text-xl text-gray-600 dark:text-gray-400"></i>
                                                                                <h3 class="font-bold text-gray-800 dark:text-gray-100">${titleDisplay}</h3>
                                                                            </div>
                                                                            <div class="flex items-center gap-2">
                                                                                <button data-action="collapse" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-400" title="${isCollapsed ? '展開' : '折りたたむ'}">
                                                                                  <i class="fas ${isCollapsed ? 'fa-chevron-down' : 'fa-chevron-up'} pointer-events-none"></i>
                                                                                </button>
                                                                                <label class="flex items-center cursor-pointer" title="${isEnabled ? '無効化' : '有効化'}">
                                                                                    <div class="relative">
                                                                                        <input type="checkbox" data-action="toggle" class="sr-only module-toggle-checkbox" ${isEnabled ? 'checked' : ''}>
                                                                                        <div class="block bg-gray-300 w-10 h-6 rounded-full dark:bg-gray-600"></div>
                                                                                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                                                                                    </div>
                                                                                </label>
                                                                                <button data-action="run" class="p-2 text-green-500 hover:text-green-700 dark:hover:text-green-400" title="このモジュールのみ実行"><i class="fas fa-play pointer-events-none"></i></button>
                                                                                <button data-action="delete" class="p-2 text-red-500 hover:text-red-700 dark:hover:text-red-400" title="削除"><i class="fas fa-trash pointer-events-none"></i></button>
                                                                            </div>
                                                                        </div>
                                                                        <div class="module-content-wrapper ${isCollapsed ? 'hidden' : ''}">
                                                                          <div class="module-description mt-1 text-sm text-gray-500 dark:text-gray-400">${moduleDef.description || ''}</div>
                                                                          ${settingsHTML}
                                                                          ${containerHTML}
                                                                        </div>
                                                                    </div>
                                                                </div>`;
                                                  moduleEl.innerHTML = contentHTML;
                                          
                                                  // --- Attach Event Listeners ---

                                                    // Prevent selection when clicking on interactive elements
                                                    if (e.target.closest('button, input, select, textarea, label, .handle')) {
                                                      console.log('  Clicked on interactive element, preventing selection.');
                                                      return;
                                                    }
                                                    e.stopPropagation(); // Prevent container click from firing
                                                    const instanceId = module.instanceId;
                                                    const index = state.selectedInstanceIds.indexOf(instanceId);
                                                    if (index > -1) {
                                                      state.selectedInstanceIds.splice(index, 1);
                                                      console.log(`  Module ${instanceId} deselected. Current selected count: ${state.selectedInstanceIds.length}`);
                                                    } else {
                                                      state.selectedInstanceIds.push(instanceId);
                                                      console.log(`  Module ${instanceId} selected. Current selected count: ${state.selectedInstanceIds.length}`);
                                                    }
                                                    renderModules(); // Re-render to apply the selected class
                                                    updateSelectionActionsUI();
                                                  });

                                                  // Use 'change' instead of 'input' to prevent re-rendering on every keystroke
                                                  moduleEl.addEventListener('change', (e) => {
                                                    if (e.target.dataset.settingId) {
                                                        const settingId = e.target.dataset.settingId;
                                                        const value = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
                                                        module.settings[settingId] = value;
                                                        markDirty();
                                                    }
                                                  });
                        
                                                  moduleEl.querySelector('[data-action="collapse"]').addEventListener('click', () => {
                                                    module.isCollapsed = !module.isCollapsed;
                                                    renderModules();
                                                  });

                                                  moduleEl.querySelector('[data-action="toggle"]').addEventListener('change', (e) => {
                                                      module.enabled = e.target.checked;
                                                      markDirty();
                                                      renderModules(); // Re-render to apply opacity class
                                                  });
                                
                                                  moduleEl.querySelector('[data-action="run"]').addEventListener('click', () => {
                                                      runSingleModule(module);
                                                  });
                                      
                                                  moduleEl.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                                                      e.stopPropagation();
                                                      // Find and remove the module from its parent array
                                                      const index = parentModuleArray.findIndex(m => m.instanceId === module.instanceId);
                                                      if (index > -1) {
                                                          parentModuleArray.splice(index, 1);
                                                          markDirty();
                                                          renderModules(); // Re-render to update the UI and connectors
                                                      }
                                                  });
                                          
                                                  return moduleEl;
                                              };
                                          
                                              const renderModulePalette = (modulesToRender = state.allModuleDefinitions) => {
                                                  app.moduleList.innerHTML = '';
                                                  if (modulesToRender.length === 0) {
                                                      app.moduleList.innerHTML = `<p class="text-center text-sm text-red-400 p-4">該当するモジュールが見つかりません。</p>`;
                                                      return;
                                                  }
                                                  const categories = {};
                                                  modulesToRender.forEach(m => {
                                                      const cat = m.category || '未分類';
                                                      if (!categories[cat]) categories[cat] = [];
                                                      categories[cat].push(m);
                                                  });
                        
                                                  for (const category in categories) {
                                                      const categoryCard = document.createElement('div');
                                                      categoryCard.className = 'category-card bg-white dark:bg-gray-800 rounded-lg mb-3 border border-gray-200 dark:border-gray-700';
                        
                                                      const categoryHeader = document.createElement('div');
                                                      categoryHeader.className = 'category-header flex justify-between items-center p-2 cursor-pointer bg-gray-100 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600';
                                                      categoryHeader.innerHTML = `
                                                          <h4 class="font-bold text-gray-800 dark:text-gray-100">${category}</h4>
                                                          <i class="fas fa-chevron-down transform transition-transform duration-200"></i>
                                                      `;
                        
                                                      const modulesContainer = document.createElement('div');
                                                      // Initially hidden, will be toggled by click
                                                      modulesContainer.className = 'category-modules p-2 space-y-2 hidden';
                        
                                                      categories[category].forEach(m => {
                                                          const moduleCard = document.createElement('div');
                                                          moduleCard.className = 'module-card bg-gray-50 dark:bg-gray-700 p-2 rounded-md shadow-md cursor-grab flex items-center gap-2 hover:bg-blue-50 dark:hover:bg-gray-600';
                                                          moduleCard.dataset.moduleId = m.id;
                                                          moduleCard.innerHTML = `
                                                              <i class="fas ${m.icon || 'fa-extension'} text-blue-600 dark:text-blue-400"></i>
                                                              <span class="text-sm font-medium text-gray-800 dark:text-gray-300">${m.name}</span>
                                                          `;
                                                          modulesContainer.appendChild(moduleCard);
                                                      });
                        
                                                      categoryCard.appendChild(categoryHeader);
                                                      categoryCard.appendChild(modulesContainer);
                                                      app.moduleList.appendChild(categoryCard);
                        
                                                      // Add click listener for accordion
                                                      categoryHeader.addEventListener('click', () => {
                                                          modulesContainer.classList.toggle('hidden');
                                                          categoryHeader.querySelector('i').classList.toggle('rotate-180');
                                                      });
                        
                                                      // Init SortableJS for each category's module container
                                                      new Sortable(modulesContainer, {
                                                          group: { name: 'shared', pull: 'clone', put: false },
                                                          animation: 150,
                                                          sort: false,
                                                          draggable: '.module-card',
                                                          delay: 100,
                                                          delayOnTouchOnly: true,
                                                          onStart: () => {
                                                              if (window.innerWidth < 768) {
                                                                  minimizeModulePalette();
                                                              }
                                                          },
                                                          onEnd: () => {
                                                              if (window.innerWidth < 768) {
                                                                  setTimeout(maximizeModulePalette, 100);
                                                              }
                                                          }
                                                      });
                                                  }
                                              };
                                          
                                              const updateWorkflowList = (workflowNames) => {
                                                  app.workflowSelector.innerHTML = '<option value="">-- 新規ワークフロー --</option>';
                                                  state.initialWorkflows = workflowNames;
                                                  workflowNames.forEach(name => {
                                                      const option = document.createElement('option');
                                                      option.value = name;
                                                      option.textContent = name;
                                                      app.workflowSelector.appendChild(option);
                                                  });
                                                  if (state.currentWorkflowName) app.workflowSelector.value = state.currentWorkflowName;
                                              };
                                          
                                              const getWorkflowData = () => {
                                                // The state is the source of truth, so we just need to clone it.
                                                // The order is already managed by the onUpdate handlers.
                                                const clonedModules = JSON.parse(JSON.stringify(state.modules));
                                                
                                                console.log('Getting workflow data. Modules being saved:', clonedModules);
                                            
                                                return {
                                                  name: state.currentWorkflowName || '新規ワークフロー',
                                                  moduleFolderId: state.currentModuleFolderId,
                                                  modules: clonedModules
                                                };
                                              };
                                            
                                              // Helper function to find a module by instanceId recursively
                                              const findModuleByInstanceId = (modules, instanceId) => {
                                                for (const module of modules) {
                                                  if (module.instanceId === instanceId) {
                                                    return module;
                                                  }
                                                  if (module.type === 'container') {
                                                    if (module.branches) {
                                                      for (const branch of module.branches) {
                                                        if (module[branch.id]) {
                                                          const found = findModuleByInstanceId(module[branch.id], instanceId);
                                                          if (found) return found;
                                                        }
                                                      }
                                                    }
                                                    if (module.modules) {
                                                      const found = findModuleByInstanceId(module.modules, instanceId);
                                                      if (found) return found;
                                                    }
                                                  }
                                                }
                                                return null;
                                              };
                                              
                                              const loadModuleDefinitionsFromDrive = async () => {
                                                  const folderId = app.moduleFolderIdInput.offsetParent ? app.moduleFolderIdInput.value.trim() : app.moduleFolderIdInputMobile.value.trim();
                                                  if (!folderId) {
                                                      state.allModuleDefinitions = [];
                                                      renderModulePalette();
                                                      return;
                                                  }
                                                  showLoader();
                                                  try {
                                                      const definitions = await new Promise((resolve, reject) => {
                                                          google.script.run
                                                              .withSuccessHandler(resolve)
                                                              .withFailureHandler(reject)
                                                              .loadModuleDefinitions(folderId);
                                                      });
                                                      state.currentModuleFolderId = folderId;
                                                      state.allModuleDefinitions = definitions;
                                                      log(`Driveから ${definitions.length} 個のモジュール定義を読み込みました。`, 'success');
                                                  } catch (error) {
                                                      state.allModuleDefinitions = [];
                                                      showError(error);
                                                  } finally {
                                                      renderModulePalette();
                                                      hideLoader();
                                                  }
                                              };
                                          
                                              const loadWorkflows = async () => {
                                                  try {
                                                      const workflows = await new Promise((resolve, reject) => {
                                                          google.script.run
                                                              .withSuccessHandler(resolve)
                                                              .withFailureHandler(reject)
                                                              .listWorkflows();
                                                      });
                                                      updateWorkflowList(workflows);
                                                  } catch (error) {
                                                      showError(error);
                                                  }
                                              };
                                              
                                              const findAndDeleteModule = (modules, instanceId) => {
                                                for (let i = 0; i < modules.length; i++) {
                                                  const module = modules[i];
                                                  if (module.instanceId === instanceId) {
                                                    modules.splice(i, 1);
                                                    return true; // Found and deleted
                                                  }
                                                  if (module.type === 'container') {
                                                    if (module.branches) {
                                                      for (const branch of module.branches) {
                                                        if (module[branch.id] && findAndDeleteModule(module[branch.id], instanceId)) {
                                                          return true;
                                                        }
                                                      }
                                                    }
                                                    if (module.modules) {
                                                      if (findAndDeleteModule(module.modules, instanceId)) {
                                                        return true; // Found and deleted in a nested container
                                                      }
                                                    }
                                                  }
                                                }
                                                return false; // Not found in this branch
                                              };
                        
                                              const deleteModule = (instanceId) => {
                                                  if (findAndDeleteModule(state.modules, instanceId)) {
                                                      markDirty();
                                                      renderModules(); // This will also call drawConnectors
                                                  }
                                              };
                                          
                                              const newWorkflow = async () => {
                                                  if (state.isDirty) {
                                                      const confirmed = await showCustomDialog({ title: '確認', message: '未保存の変更があります。破棄しますか？', type: 'confirm' });
                                                      if (!confirmed) return;
                                                  }
                                                  state.currentWorkflowName = '';
                                                  state.modules = [];
                                                  state.selectedInstanceIds = [];
                                                  updateSelectionActionsUI();
                                                  state.isDirty = false;
                                                  app.workflowSelector.value = '';
                                                  updateUI();
                                                  drawConnectors(); // Clear connectors
                                                  log('新規ワークフローを作成しました。', 'system');
                                              };

                                              const sanitizeModules = (modules) => {
                                                if (!modules) {
                                                  return [];
                                                }
                                                modules.forEach(module => {
                                                  if (module.type === 'container') {
                                                    if (module.branches) {
                                                      module.branches.forEach(branch => {
                                                        module[branch.id] = sanitizeModules(module[branch.id]);
                                                      });
                                                    }
                                                    if (module.modules) {
                                                      module.modules = sanitizeModules(module.modules);
                                                    }
                                                  }
                                                });
                                                return modules;
                                              };
                                          
                                              const handleWorkflowSelect = async () => {
                                                  const workflowName = app.workflowSelector.value;
                                                  if (state.isDirty) {
                                                      const confirmed = await showCustomDialog({ title: '確認', message: '未保存の変更があります。破棄しますか？', type: 'confirm' });
                                                      if (!confirmed) {
                                                          app.workflowSelector.value = state.currentWorkflowName;
                                                          return;
                                                      }
                                                  }
                                                  
                                                  state.selectedInstanceIds = [];
                                                  updateSelectionActionsUI();

                                                  if (workflowName) {
                                                      showLoader();
                                                      google.script.run
                                                          .withSuccessHandler(async (data) => {
                                                              state.currentWorkflowName = workflowName;
                                                              state.currentModuleFolderId = data.moduleFolderId || '';
                                                              // Sanitize loaded modules to ensure containers have a 'modules' array
                                                              state.modules = sanitizeModules(data.modules);
                                                              state.isDirty = false;
                                                              // First, ensure module definitions for the workflow's folder are loaded
                                                              await loadModuleDefinitionsFromDrive();
                                                              // Then, render the UI
                                                              updateUI();
                                                              setTimeout(drawConnectors, 100); // Redraw connectors after UI update
                                                              hideLoader();
                                                              log(`ワークフロー「${workflowName}」を読み込みました。`, 'system');
                                                          })
                                                          .withFailureHandler(showError)
                                                          .loadWorkflow(workflowName);
                                                  } else {
                                                      newWorkflow();
                                                  }
                                              };
                                    
                                              const runSingleModule = (moduleConfig) => {
                                                  if (state.isDirty) {
                                                      showCustomDialog({ title: 'エラー', message: '変更を保存してから実行してください。', type: 'alert' });
                                                      return;
                                                  }
                                                  showLoader();
                                                  log(`--- 単体実行開始: ${moduleConfig.name} ---`, 'system');
                                                  google.script.run
                                                      .withSuccessHandler(logs => {
                                                          logs.forEach(l => log(l.message, l.level)); // LogServiceのlevelをそのまま使う
                                                          log(`--- 単体実行完了: ${moduleConfig.name} ---`, 'system');
                                                          hideLoader();
                                                      })
                                                      .withFailureHandler(showError)
                                                      .runSingleModule(state.currentWorkflowName || '新規ワークフロー', moduleConfig, state.currentModuleFolderId);
                                              };
                                          
                                              const hideLog = () => {
                                                state.logArea.originalHeight = app.logArea.style.height || '16rem';
                                                app.logArea.classList.add('hidden');
                                                app.showLogBtn.classList.remove('hidden');
                                                app.mobileShowLogBtn.classList.remove('hidden');
                                              };
                                          
                                              const showLog = () => {
                                                app.logArea.classList.remove('hidden');
                                                app.showLogBtn.classList.add('hidden');
                                                app.mobileShowLogBtn.classList.add('hidden');
                                                app.logArea.style.height = state.logArea.originalHeight;
                                              };
                                              
                                              const initResizing = () => {
                                                let isResizingLog = false;
                                                let lastY = 0;
                                          
                                                const startResizeLog = (e) => {
                                                  e.preventDefault();
                                                  isResizingLog = true;
                                                  lastY = e.clientY || e.touches[0].clientY;
                                                  document.body.style.cursor = 'ns-resize';
                                                  document.body.style.userSelect = 'none';
                                                };
                                          
                                                const doResize = (e) => {
                                                  if (!isResizingLog) return;
                                                  
                                                  const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
                                          
                                                  if (isResizingLog) {
                                                    const dy = lastY - clientY;
                                                    lastY = clientY;
                                                    const currentHeight = app.logArea.offsetHeight;
                                                    const logHeader = app.logArea.querySelector('.flex.items-center.justify-between');
                                                    const headerPaddingAndMargin = 28; // p-3's vertical padding (24px) + header's mb-1 (4px)
                                                    const minHeight = (logHeader ? logHeader.offsetHeight : 0) + headerPaddingAndMargin;
                                    
                                                    const newHeight = Math.max(minHeight, currentHeight + dy);
                                                    app.logArea.style.height = `${newHeight}px`;
                                                  }
                                                };
                                          
                                                const stopResize = () => {
                                                  isResizingLog = false;
                                                  document.body.style.cursor = 'default';
                                                  document.body.style.userSelect = 'auto';
                                                };
                                          
                                                // Log resize handle
                                                app.resizeHandle.addEventListener('mousedown', startResizeLog);
                                                app.resizeHandle.addEventListener('touchstart', startResizeLog, { passive: false });
                                          
                                                document.addEventListener('mousemove', doResize);
                                                document.addEventListener('touchmove', doResize, { passive: false });
                                          
                                                document.addEventListener('mouseup', stopResize);
                                                document.addEventListener('touchend', stopResize);
                                              };
                        
                                              const maximizeModulePalette = () => {
                                                if (window.innerWidth >= 768) return;
                                                app.modulePalette.classList.add('is-open');
                                                app.modulePaletteToggleIcon.classList.remove('rotate-180');
                                                state.modulePalette.isMinimized = false;
                                              };
                        
                                              const minimizeModulePalette = () => {
                                                if (window.innerWidth >= 768) return;
                                                app.modulePalette.classList.remove('is-open');
                                                app.modulePaletteToggleIcon.classList.add('rotate-180');
                                                state.modulePalette.isMinimized = true;
                                              };
                        
                                              const toggleModulePalette = () => {
                                                if (window.innerWidth >= 768) return;
                                                if (state.modulePalette.isMinimized) {
                                                  maximizeModulePalette();
                                                } else {
                                                  minimizeModulePalette();
                                                }
                                              };
                                          
                                              function init() {
                                                const debouncedDrawConnectors = debounce(drawConnectors, 100);
                                                window.addEventListener('resize', debouncedDrawConnectors);

                                                initEventListeners();
                                                initResizing();
                                    
                                                // Set initial heights for mobile view
                                                if (window.innerWidth < 768) { // md breakpoint
                                                  minimizeModulePalette();
                                                }
                                    
                                                            google.script.run.withSuccessHandler(data => {
                                                              console.log('Initial data loaded.', data);
                                                              state.appSettings = data.settings || {};
                                                              if (typeof state.appSettings.darkMode === 'undefined') {
                                                                state.appSettings.darkMode = false;
                                                              }
                                                              applySettings(state.appSettings);
                                                
                                                              if (data.workflows) {
                                                                  updateWorkflowList(data.workflows);
                                                              }
                                                              if (data.moduleFolderId) {
                                                                state.currentModuleFolderId = data.moduleFolderId;
                                                                app.moduleFolderIdInput.value = data.moduleFolderId;
                                                                app.moduleFolderIdInputMobile.value = data.moduleFolderId;
                                                                loadModuleDefinitionsFromDrive();
                                                              }
                                                              hideLoader();
                                                            }).withFailureHandler(showError).getInitialData();
                                                updateUI();
                                                updateSelectionActionsUI();
                                              }
                                          
                                              init();
                                          </script>
