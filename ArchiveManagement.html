<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4">

  <!-- Config List -->
  <div id="config-list" class="space-y-2">
    <p class="text-gray-500">設定を読み込み中...</p>
  </div>

  <!-- Add New Button -->
  <div class="mt-4">
    <button id="add-new-config-btn" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors">
      <i class="fas fa-plus mr-2"></i> 新しい自動保管を追加
    </button>
  </div>

  <!-- Wizard Modal -->
  <div id="wizard-backdrop" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
    <div id="wizard-modal" class="bg-white rounded-xl shadow-2xl w-full max-w-3xl flex flex-col max-h-[90vh]">
      <header id="wizard-header" class="p-4 border-b flex justify-between items-center flex-shrink-0">
        <h2 id="wizard-title" class="text-xl font-bold"></h2>
        <button id="wizard-close-btn" class="p-2 rounded-full hover:bg-gray-200"><i class="fas fa-times"></i></button>
      </header>
      <main id="wizard-content" class="p-6 flex-grow overflow-y-auto">
        <!-- Wizard HTML will be injected here -->
      </main>
    </div>
  </div>

  <script>
    google.script.run.logInfo('ArchiveManagement: Script loaded.', 'ArchiveFeature');

    const configList = document.getElementById('config-list');
    const addBtn = document.getElementById('add-new-config-btn');
    const wizardBackdrop = document.getElementById('wizard-backdrop');
    const wizardModal = document.getElementById('wizard-modal');
    const wizardTitle = document.getElementById('wizard-title');
    const wizardContent = document.getElementById('wizard-content');
    const wizardCloseBtn = document.getElementById('wizard-close-btn');

    function refreshConfigs() {
      configList.innerHTML = '<p class="text-gray-500">Loading configurations...</p>';
      google.script.run
        .withSuccessHandler(renderConfigs)
        .withFailureHandler(err => {
          configList.innerHTML = `<p class="text-red-500">設定の読み込み中にエラーが発生しました: ${err}</p>`;
        })
        .getArchiveConfigs();
    }

    function renderConfigs(configs) {
      configList.innerHTML = '';
      if (configs && configs.length > 0) {
        configs.forEach(config => {
          const configElement = document.createElement('div');
          configElement.className = 'bg-white p-3 rounded-lg shadow-sm flex justify-between items-center';
          const searchTerm = config.module.settings.find(s => s.id === 'searchTerm').value;
          configElement.innerHTML = `
            <div>
              <p class="font-semibold text-gray-800">${config.module.name}</p>
              <p class="text-sm text-gray-500">検索条件: \"${searchTerm}\"</p>
            </div>
            <button data-workflow-name="${config.workflowName}" class="delete-btn text-red-500 hover:text-red-700 transition-colors">
              <i class="fas fa-trash"></i>
            </button>
          `;
          configList.appendChild(configElement);
        });
      } else {
        configList.innerHTML = '<p class="text-center text-gray-500">自動保管設定は見つかりませんでした。</p>';
      }
    }

    function showWizard(response) {
      wizardTitle.textContent = response.title;
      wizardContent.innerHTML = response.html;
      wizardBackdrop.classList.remove('hidden');

      // Execute the script from the loaded HTML
      const scripts = wizardContent.getElementsByTagName('script');
      for (let i = 0; i < scripts.length; i++) {
        const script = document.createElement('script');
        script.text = scripts[i].innerText;
        scripts[i].parentNode.replaceChild(script, scripts[i]);
      }
    }

    function hideWizard() {
      wizardBackdrop.classList.add('hidden');
      wizardContent.innerHTML = '';
      refreshConfigs(); // Refresh the list after closing the wizard
    }

    // Initial load
    refreshConfigs();

    // Handle Add New
    addBtn.addEventListener('click', () => {
      google.script.run.logInfo('ArchiveManagement: Add New button clicked.', 'ArchiveFeature');
      google.script.run
        .withSuccessHandler(showWizard)
        .showArchiveSettings();
    });

    // Handle Wizard Close
    wizardCloseBtn.addEventListener('click', hideWizard);
    wizardBackdrop.addEventListener('click', (e) => {
      if (e.target === wizardBackdrop) {
        hideWizard();
      }
    });
    // The wizard itself will call google.script.host.close() which we can listen for.
    // However, a more robust way is to handle it within this modal's context.
    // We will override the default close behavior.
    window.closeModalAndRefresh = hideWizard;

    // Handle Delete
    configList.addEventListener('click', (e) => {
      const deleteBtn = e.target.closest('.delete-btn');
      if (deleteBtn) {
        const workflowName = deleteBtn.dataset.workflowName;
        if (confirm(`設定「${workflowName}」を本当に削除しますか？`)) {
          google.script.run
            .withSuccessHandler(renderConfigs)
            .withFailureHandler(err => alert('設定の削除中にエラーが発生しました: ' + err))
            .deleteArchiveConfig(workflowName);
        }
      }
    });

    // Override google.script.host.close for the wizard
    google.script.host.close = () => {
      hideWizard();
    };
  </script>
</body>
</html>
