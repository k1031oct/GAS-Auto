<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4">
  <div id="config-list" class="space-y-2">
    <!-- Config items will be injected here -->
    <p class="text-gray-500">Loading configurations...</p>
  </div>

  <div class="mt-4">
    <button id="add-new-config-btn" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors">
      <i class="fas fa-plus mr-2"></i> 新しい自動保管を追加
    </button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const configList = document.getElementById('config-list');
      const addBtn = document.getElementById('add-new-config-btn');

      // Function to render configurations
      function renderConfigs(configs) {
        configList.innerHTML = '';
        if (configs && configs.length > 0) {
          configs.forEach(config => {
            const configElement = document.createElement('div');
            configElement.className = 'bg-white p-3 rounded-lg shadow-sm flex justify-between items-center';
            configElement.innerHTML = `
              <div>
                <p class="font-semibold text-gray-800">${config.name}</p>
                <p class="text-sm text-gray-500">Search: "${config.settings.find(s => s.id === 'searchTerm').value}"</p>
              </div>
              <button data-id="${config.id}" class="delete-btn text-red-500 hover:text-red-700 transition-colors">
                <i class="fas fa-trash"></i>
              </button>
            `;
            configList.appendChild(configElement);
          });
        } else {
          configList.innerHTML = '<p class="text-center text-gray-500">No archive configurations found.</p>';
        }
      }

      // Fetch and render configs on load
      google.script.run
        .withSuccessHandler(renderConfigs)
        .withFailureHandler(err => {
          configList.innerHTML = `<p class="text-red-500">Error loading configurations: ${err}</p>`;
        })
        .getArchiveConfigs();

      // Handle Add New
      addBtn.addEventListener('click', () => {
        google.script.run.showArchiveWizard();
      });

      // Handle Delete
      configList.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) {
          const configId = deleteBtn.dataset.id;
          if (confirm('Are you sure you want to delete this configuration?')) {
            google.script.run
              .withSuccessHandler((remainingConfigs) => {
                renderConfigs(remainingConfigs);
                // Maybe show a success toast in the main UI later
              })
              .withFailureHandler(err => alert('Error deleting configuration: ' + err))
              .deleteArchiveConfig(configId);
          }
        }
      });
    });
  </script>
</body>
</html>
