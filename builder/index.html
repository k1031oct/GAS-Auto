  <script>
    document.addEventListener('DOMContentLoaded', () => {

       // --- グローバル変数 ---
      let allModules = [],
        initialWorkflows = [],
        activeTriggers = [],
        appSettings = {},
        initialPresets = [];
      let clipboard = [];
      let lastSelectedModule = null;

       // --- DOM要素のキャッシュ ---
      const moduleList = document.getElementById('module-list');
      const workflowContainer = document.getElementById('workflow-container');
      const loaderOverlay = document.getElementById('loader-overlay');
      const workflowSelector = document.getElementById('workflow-selector');
      const triggerDialog = document.getElementById('trigger-dialog');

       // --- UI定義データ ---
      const menuStructure = [{
        title:  'ファイル' ,
        items: [
          { id: 'open-workflow-dialog-btn', icon: 'file_open', text:  '開く...'  },
          { id: 'new-workflow-btn', icon: 'add_circle_outline', text:  '新規作成'  },
          { id: 'save-as-button', icon: 'save', text:  '名前を付けて保存'  },
          { id: 'open-folder-button', icon: 'folder_open', text:   '保存先フォルダを開く'   },
          { type: 'separator' },
          {
            text:  '実行' ,
            icon: 'play_arrow',
            submenu: [
              { id: 'run-button', icon: 'play_arrow', text:  '手動実行'  },
              { id: 'trigger-button', icon: 'alarm', text:  '定期実行'  },
              { id: 'individual-exec-button', icon: 'playlist_play', text:  '予約実行'  }
            ]
          },
          {
            text:  'プリセット' ,
            icon: 'inventory_2',
            submenu: [
              { id: 'open-preset-dialog-btn', icon: 'folder_open', text:  '開く...'  },
              { id: 'save-preset-button', icon: 'inventory_2', text:  '現在の選択を保存'  },
              { id: 'delete-preset-button', icon: 'delete_sweep', text:  '削除...'  }
            ]
          },
          {
            text:  'テンプレート' ,
            icon: 'library_add',
            submenu: [
              { id: 'create-from-template-ribbon-btn', icon: 'library_add', text:  'シート作成'  }
            ]
          },
          { type: 'separator' },
          { id: 'delete-workflow-button', icon: 'delete_forever', text:  'ワークフローを削除'  }
        ]
      },
      {
        title:  '編集' ,
        items: [{
          id: 'copy-button',
          icon: 'content_copy',
          text:  'コピー' 
        }, {
          id: 'paste-button',
          icon: 'content_paste',
          text:  '貼り付け' 
        }, {
          id: 'delete-module-button',
          icon: 'delete',
          text:  '削除' 
        }]
      },
      {
        title:  '表示' ,
        items: [{
          text:  'テーマ変更' ,
          icon: 'palette',
          submenu: [{
            id: 'theme-default-btn',
            text: 'Default' 
          }, {
            id: 'theme-dark-btn',
            text: 'Dark' 
          }]
        }, {
          text:  '表示切替' ,
          icon: 'visibility',
          submenu: [{
            id: 'toggle-sidebar-btn',
            text:  'パレット' 
          }, {
            id: 'toggle-ribbon-btn',
            text:  'ヘッダー' 
          }, {
            id: 'toggle-result-area-btn',
            text:  '実行結果' 
          }]
        }]
      }, {
        title:  'ツール' ,
        items: [{
          id: 'history-button',
          icon: 'history',
          text:  '実行履歴' 
        }, {
          id: 'generate-doc-btn',
          icon: 'article',
          text:  '仕様書をエクスポート' 
        }, {
          id: 'export-gas-btn',
          icon: 'code',
          text:  'GASをエクスポート' 
        }]
      }, {
        title:  '設定' ,
        items: [{
          id: 'secrets-button',
          icon: 'key',
          text:  '認証情報の管理' 
        }, {
          id: 'settings-button',
          icon: 'settings',
          text:  'アプリケーションの設定' 
        }]
      }, {
        title:  'ヘルプ' ,
        items: [{
          id: 'open-design-doc-btn',
          icon: 'description',
          text:  '設計書' 
        }, {
          id: 'open-user-guide-btn',
          icon: 'help_outline',
          text:  '利用ガイド' 
        }]
      }];

       // --- アプリケーション初期化 ---
      function initializeApp(data) {
        allModules = data.modules || [];
        initialWorkflows = data.workflows || [];
        activeTriggers = data.triggers || [];
        initialPresets = data.presets || [];
        appSettings = data.settings || {};
        const savedTheme = localStorage.getItem('workflowBuilderTheme');
        if (savedTheme) applyTheme(savedTheme);
        populateModulePalette(allModules);
        updateWorkflowList(initialWorkflows);
        updatePresetList(initialPresets);
        componentHandler.upgradeDom();
        initializeEventListeners();
        hideLoader();
        updateButtonStates();
      }

       // --- UI更新 / 状態管理 ---
      function updateButtonStates() {
        const selectedModules = workflowContainer.querySelectorAll('.workflow-module.is-selected');
        const selectedWorkflow = workflowSelector.value;
        document.getElementById('copy-button').disabled = selectedModules.length === 0;
        document.getElementById('paste-button').disabled = clipboard.length === 0;
        document.getElementById('save-preset-button').disabled = selectedModules.length === 0;
        document.getElementById('load-button').disabled = !selectedWorkflow;
        document.getElementById('open-folder-button').disabled = !selectedWorkflow;
        document.getElementById('individual-exec-button').disabled = !(appSettings.isPollingEnabled);
        document.getElementById('delete-module-button').disabled = selectedModules.length === 0;
        document.getElementById('delete-workflow-button').disabled = !selectedWorkflow;
      }

      function regenerateInstanceIds(moduleData) {
        moduleData.instanceId = `${moduleData.id}-${Date.now()}-${Math.random().toString(36).substring(2, 9)}`;
        if (moduleData.type === 'container' && moduleData.settings) {
          for (const key in moduleData.settings) {
            if (key.endsWith('Modules') && Array.isArray(moduleData.settings[key])) {
              moduleData.settings[key].forEach(childModule => regenerateInstanceIds(childModule));
            }
          }
        }
        return moduleData;
      }

       // --- ドロップダウンメニューUIを生成する関数 ---
      function createDropdownMenus() {
        const menuBar = document.getElementById('ribbon-menu-bar');
        menuBar.innerHTML = '';

        const createMenuItem = (itemData) => {
          const listItem = document.createElement('li');
          const link = document.createElement('a');
          link.href = '#';

          const mainContent = document.createElement('div');
          mainContent.className = 'menu-item-main';
          
          const icon = document.createElement('i');
          icon.className = 'material-icons';
          icon.textContent = itemData.icon || 'label_important';
          mainContent.appendChild(icon);

          const text = document.createElement('span');
          text.textContent = itemData.text;
          mainContent.appendChild(text);
          link.appendChild(mainContent);

          if (itemData.id) {
            link.dataset.actionId = itemData.id;
          }

          if (itemData.submenu) {
            const arrow = document.createElement('i');
            arrow.className = 'material-icons submenu-arrow';
            arrow.textContent = 'arrow_right';
            link.appendChild(arrow);
            
            const submenu = document.createElement('ul');
            submenu.className = 'submenu';
            itemData.submenu.forEach(subItemData => {
              submenu.appendChild(createMenuItem(subItemData));
            });
            listItem.appendChild(submenu);
          }
          
          listItem.appendChild(link);
          return listItem;
        };

         // メインメニューのループ処理
        menuStructure.forEach(menuData => {
          const menuItemContainer = document.createElement('div');
          menuItemContainer.className = 'ribbon-menu-item';

          const button = document.createElement('button');
          button.className = 'ribbon-menu-button';
          button.textContent = menuData.title;
          menuItemContainer.appendChild(button);

          const dropdown = document.createElement('div');
          dropdown.className = 'dropdown-content';
          const list = document.createElement('ul');

          menuData.items.forEach(itemData => {
            if (itemData.type === 'separator') {
              const separator = document.createElement('li');
              separator.className = 'separator';
              list.appendChild(separator);
            } else {
              list.appendChild(createMenuItem(itemData));
            }
          });

          dropdown.appendChild(list);
          menuItemContainer.appendChild(dropdown);
          menuBar.appendChild(menuItemContainer);
        });
      }

       // --- ログ / ローダー / テーマ ---
      function log(message, type = 'INFO') {
        const resultContent = document.getElementById('result-content');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const timestamp = new Date().toLocaleTimeString();
        if (type === 'ERROR') entry.classList.add('error');
        if (type === 'SUCCESS') entry.classList.add('success');
        entry.textContent = `[${type}] ${timestamp}: ${message}`;
        resultContent.appendChild(entry);
        resultContent.scrollTop = resultContent.scrollHeight;
      }

      function showLoader() {
        loaderOverlay.style.display = 'flex';
      }

      function hideLoader() {
        loaderOverlay.style.display = 'none';
      }

      function applyTheme(themeName) {
        document.body.className = '';
        if (themeName !== 'default') document.body.classList.add(themeName);
        localStorage.setItem('workflowBuilderTheme', themeName);
      }

       // --- ワークフロー/プリセットリスト更新 ---
      function updateWorkflowList(workflowNames, selectName = '') {
        workflowSelector.innerHTML =  '<option value="">-- 新規ワークフロー --</option>' ;
        workflowNames.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          if (name === selectName) option.selected = true;
          workflowSelector.appendChild(option);
        });
        updateButtonStates();
      }

      function updatePresetList(presetNames) {
        const selector = document.getElementById('preset-selector');
        selector.innerHTML =  '<option value="">プリセットから読込</option>' ;
        if (presetNames.length === 0) {
          const option = document.createElement('option');
          option.textContent =  '保存済みのプリセットはありません' ;
          option.disabled = true;
          selector.appendChild(option);
        } else {
          presetNames.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            selector.appendChild(option);
          });
        }
      }

       // --- コピー＆ペースト ---
      function copySelectedModules() {
        const allSelected = Array.from(workflowContainer.querySelectorAll('.workflow-module.is-selected'));
        if (allSelected.length === 0) return;
        const topLevelSelected = allSelected.filter(el => {
          const parentModule = el.parentElement.closest('.workflow-module');
          return !parentModule || !parentModule.classList.contains('is-selected');
        });
        if (topLevelSelected.length === 0) return;
        clipboard = topLevelSelected
          .map(el => getModuleDataFromElement(el))
          .map(data => regenerateInstanceIds(JSON.parse(JSON.stringify(data))));
        log( `${clipboard.length}個のモジュール（とその中身）をコピーしました。` , 'SUCCESS');
        updateButtonStates();
      }

      function pasteFromClipboard() {
        if (clipboard.length === 0) return;
        const lastSelected = workflowContainer.querySelector(':scope > .workflow-module.is-selected:last-of-type');
        let lastPastedEl = lastSelected;
        const pastedElements = [];
        clipboard.forEach(moduleData => {
          const newModuleEl = createModuleElement(moduleData.id, moduleData.settings, moduleData.instanceId);
          if (newModuleEl) {
            if (lastPastedEl) {
              lastPastedEl.after(newModuleEl);
            } else {
              workflowContainer.appendChild(newModuleEl);
            }
            lastPastedEl = newModuleEl;
            pastedElements.push(newModuleEl);
          }
        });
        workflowContainer.querySelectorAll('.workflow-module.is-selected').forEach(mod => mod.classList.remove('is-selected'));
        pastedElements.forEach(el => el.classList.add('is-selected'));
        componentHandler.upgradeDom();
        log( `${clipboard.length}個のモジュールをペーストしました。` , 'SUCCESS');
        updateButtonStates();
      }

       // --- 外部データ連携 ---
      function getAndPopulateSheetNames(urlInput, savedSheetName = '') {
        const url = urlInput.value;
        const targetSettingId = urlInput.dataset.fetchesSheetsFor;
        const moduleEl = urlInput.closest('.workflow-module');
        if (!url || !targetSettingId || !moduleEl) return;
        const targetEl = moduleEl.querySelector(`[data-setting-id="${targetSettingId}"]`);
        if (!targetEl) return;
        const currentValue = savedSheetName || (targetEl ? targetEl.value : '');
        const originalParent = targetEl.parentElement;
        const loadingMessage = document.createElement('span');
        loadingMessage.textContent =  'シート名取得中...' ;
        originalParent.replaceChild(loadingMessage, targetEl);
        google.script.run
          .withSuccessHandler(sheetNames => {
            const selectEl = document.createElement('select');
            selectEl.dataset.settingId = targetSettingId;
            sheetNames.forEach(name => {
              const option = document.createElement('option');
              option.value = name;
              option.textContent = name;
              if (name === currentValue) option.selected = true;
              selectEl.appendChild(option);
            });
            originalParent.replaceChild(selectEl, loadingMessage);
          })
          .withFailureHandler(error => {
            log(error.message, 'ERROR');
            const inputEl = document.createElement('input');
            inputEl.type = 'text';
            inputEl.dataset.settingId = targetSettingId;
            inputEl.value = currentValue;
            originalParent.replaceChild(inputEl, loadingMessage);
          })
          .getSheetNamesFromUrl(url);
      }

       // --- モジュールDOM操作 ---
      const onAddModuleCallback = function(evt) {
        if (evt.item.classList.contains('module-item')) {
          const newModuleEl = createModuleElement(evt.item.dataset.moduleId);
          if (newModuleEl) {
            evt.item.replaceWith(newModuleEl);
            if (newModuleEl.dataset.moduleType === 'container') {
              newModuleEl.querySelectorAll('.area-dropzone').forEach(zone => {
                new Sortable(zone, {
                  group: 'shared',
                  animation: 150,
                  onAdd: onAddModuleCallback,
                  delay: 150,
                  delayOnTouchOnly: true
                });
              });
            }
            componentHandler.upgradeDom();
            setTimeout(() => {
              newModuleEl.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                if (radio.offsetParent !== null) {
                  const event = new Event('change', {
                    bubbles: true
                  });
                  radio.dispatchEvent(event);
                }
              });
            }, 0);
          } else {
            evt.item.remove();
          }
        }
      };

      function renderWorkflow(modulesData, parentElement) {
        parentElement = parentElement || workflowContainer;
        parentElement.innerHTML = '';
        if (!modulesData || !Array.isArray(modulesData)) return;
        modulesData.forEach(moduleInfo => {
          const itemEl = createModuleElement(moduleInfo.id, moduleInfo.settings, moduleInfo.instanceId);
          if (itemEl) {
            parentElement.appendChild(itemEl);
            if (moduleInfo.type === 'container') {
              itemEl.querySelectorAll('.area-dropzone').forEach(zone => {
                const zoneType = zone.dataset.dropzoneType;
                const nestedModulesData = moduleInfo.settings[`${zoneType}Modules`];
                if (nestedModulesData) renderWorkflow(nestedModulesData, zone);
                new Sortable(zone, {
                  group: 'shared',
                  animation: 150,
                  onAdd: onAddModuleCallback,
                  delay: 150,
                  delayOnTouchOnly: true
                });
              });
            }
          }
        });
        componentHandler.upgradeDom();
        setTimeout(() => {
          parentElement.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
            if (radio.offsetParent !== null) {
              const event = new Event('change', {
                bubbles: true
              });
              radio.dispatchEvent(event);
            }
          });
          parentElement.querySelectorAll('.gmail-query-mode-radio:checked').forEach(radio => {
            if (radio.offsetParent !== null) {
              const event = new Event('change', {
                bubbles: true
              });
              radio.dispatchEvent(event);
            }
          });
        }, 0);
      }

  function populateModulePalette(modules) {
    if (!modules || !Array.isArray(modules) || modules.length === 0) {
      log('モジュールデータの読み込みに失敗、またはデータが空です。', 'ERROR');
      return;
    }
    allModules = modules;
    moduleList.innerHTML = '';
    const categories = [...new Set(modules.map(m => m.category))].sort();

    categories.forEach(category => {
      const categoryContainer = document.createElement('div');
      categoryContainer.className = 'module-category is-collapsed';

      const categoryHeader = document.createElement('h5');
      categoryHeader.className = 'category-header';
      categoryHeader.innerHTML = `<span>${category}</span><i class="material-icons category-toggle-icon">expand_more</i>`;
      categoryContainer.appendChild(categoryHeader);

      // This container will now hold the items directly without an extra wrapper
      const modulesContainer = document.createElement('div');
      modulesContainer.className = 'category-modules';

      modules.filter(m => m.category === category).forEach(module => {
        const div = document.createElement('div');
        div.className = 'module-item';
        div.dataset.moduleId = module.id;
        div.innerHTML = `<i class="material-icons">${module.icon || 'extension'}</i><span class="module-item-text">${module.name}</span>`;
        modulesContainer.appendChild(div);
      });

      categoryContainer.appendChild(modulesContainer);
      moduleList.appendChild(categoryContainer);
    });
  }

      function filterModules() {
        const searchTerm = document.getElementById('module-search-box').value.toLowerCase();
        const categories = document.querySelectorAll('.module-category');

        categories.forEach(category => {
          const modules = category.querySelectorAll('.module-item');
          let visibleModuleCount = 0;

          modules.forEach(module => {
            const moduleName = module.querySelector('.module-item-text').textContent.toLowerCase();
            if (moduleName.includes(searchTerm)) {
              module.style.display = 'flex';
              visibleModuleCount++;
            } else {
              module.style.display = 'none';
            }
          });

          if (visibleModuleCount > 0) {
            category.style.display = 'block';
            if (searchTerm) {
              category.classList.remove('is-collapsed');
            }
          } else {
            category.style.display = 'none';
          }
        });
      }

      function createModuleElement(moduleId, savedSettings = {}, instanceId = null) {
        const moduleData = allModules.find(m => m.id === moduleId);
        if (!moduleData) return null;
        const itemEl = document.createElement('div');
        itemEl.className = 'workflow-module';
        itemEl.dataset.moduleId = moduleData.id;
        itemEl.dataset.instanceId = instanceId || `${moduleId}-${Date.now()}`;
        const uniqueId = itemEl.dataset.instanceId;
        if (moduleData.type === 'container') {
          itemEl.dataset.moduleType = 'container';
          let containerBodyHtml = '';
          switch (moduleData.id) {
            case 'control_if_else':
              containerBodyHtml =  `<div class="container-area"><div class="area-header">IF (条件が真の場合)</div><div class= "area-dropzone" data-dropzone-type="if"></div></div><div class="container-area"><div class="area-header">ELSE (条件が偽の場合)</div><div class= "area-dropzone" data-dropzone-type="else"></div></div>` ;
              break;
            case 'control_for_each':
              containerBodyHtml =  `<div class="container-area"><div class="area-header">LOOP (各項目に対する処理)</div><div class= "area-dropzone" data-dropzone-type="loop"></div></div>` ;
              break;
            case 'control_try_catch':
              containerBodyHtml =  `<div class="container-area"><div class="area-header">TRY (エラー監視する処理)</div><div class= "area-dropzone" data-dropzone-type="try"></div></div><div class="container-area"><div class="area-header">CATCH (エラー発生時の処理)</div><div class= "area-dropzone" data-dropzone-type="catch"></div></div>` ;
              break;
            case 'control_group':
              containerBodyHtml = `<div class="container-area"><div class="area-header">GROUP</div><div class="area-dropzone" data-dropzone-type="group"></div></div>`;
              break;
          }
          let settingsHtml = '';
          if (moduleData.settings && moduleData.settings.length > 0) {
            moduleData.settings.forEach(setting => {
              const value = (savedSettings && savedSettings[setting.id] !== undefined) ? savedSettings[setting.id] : (setting.default || '');
              const showsWhenAttr = setting.showsWhen ? `data-shows-when='${JSON.stringify(setting.showsWhen)}'` : '';
              if (setting.type === 'info') {
                const warningClass = setting.id === 'warning' ? 'warning' : '';
                settingsHtml += `<p class="module-info ${warningClass}">${setting.text}</p>`;
              } else {
                const inputFieldHtml = generateInputField(setting, value, uniqueId, itemEl);
                settingsHtml += `<div class="settings-field" ${showsWhenAttr}><label>${setting.label}</label>${inputFieldHtml}</div>`;
              }
            });
          }
          itemEl.innerHTML =  `<div class="module-header"><div class="module-title-area"><i class="material-icons container-toggle-icon">expand_more</i><i class="material-icons module-icon">${moduleData.icon || 'extension'}</i><span class="module-name">${moduleData.name}</span></div><div class="header-actions"><button class="expand-btn mdl-button mdl-js-button mdl-button--icon" title="設定を開閉"><i class="material-icons expand-icon">expand_more</i></button><button class="delete-btn mdl-button mdl-js-button mdl-button--icon" title="削除"><i class="material-icons">close</i></button></div></div><div class="module-settings">${settingsHtml}</div><div class="container-body">${containerBodyHtml}</div>` ;
          const titleArea = itemEl.querySelector('.module-title-area');
          const expandBtn = itemEl.querySelector('.expand-btn');
          if (expandBtn) {
            expandBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              const settingsDiv = itemEl.querySelector('.module-settings');
              const isVisible = settingsDiv.classList.toggle('is-visible');
              expandBtn.querySelector('.expand-icon').classList.toggle('is-rotated', isVisible);
            });
          }
          if (titleArea) {
            titleArea.addEventListener('click', (e) => {
              e.stopPropagation();
              itemEl.classList.toggle('is-body-collapsed');
            });
          }
          itemEl.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            itemEl.remove();
            updateButtonStates();
          });
          if (moduleId === 'control_group') {
            const nameInput = itemEl.querySelector('[data-setting-id="groupName"]');
            const nameSpan = itemEl.querySelector('.module-name');
            const originalName = nameSpan.textContent;
            const updateGroupName = () => {
              nameSpan.textContent = nameInput.value ? `${originalName} (${nameInput.value})` : originalName;
            };
            updateGroupName();
            nameInput.addEventListener('keyup', updateGroupName);
          }
        } else {
          const isEnabled = (savedSettings && savedSettings.isEnabled !== undefined) ? savedSettings.isEnabled : true;
          const isEnabledChecked = isEnabled ? 'checked' : '';
          let settingsHtml = '';
          if (moduleData.settings && moduleData.settings.length > 0) {
            let i = 0;
            while (i < moduleData.settings.length) {
              const setting = moduleData.settings[i];
              if (setting.groupId) {
                let groupHtml = `<div class="settings-field-group" data-group-id="${setting.groupId}">`;
                const currentGroupId = setting.groupId;
                while (i < moduleData.settings.length && moduleData.settings[i].groupId === currentGroupId) {
                  const groupSetting = moduleData.settings[i];
                  const value = (savedSettings && savedSettings[groupSetting.id] !== undefined) ? savedSettings[groupSetting.id] : (groupSetting.default || '');
                  const inputFieldHtml = generateInputField(groupSetting, value, uniqueId, itemEl);
                  groupHtml += `<div class="settings-field"><label>${groupSetting.label}</label>${inputFieldHtml}</div>`;
                  i++;
                }
                groupHtml += '</div>';
                settingsHtml += groupHtml;
              } else {
                const value = (savedSettings && savedSettings[setting.id] !== undefined) ? savedSettings[setting.id] : (setting.default || '');
                const showsWhenAttr = setting.showsWhen ? `data-shows-when='${JSON.stringify(setting.showsWhen)}'` : '';
                if (setting.type === 'info') {
                  const warningClass = setting.id === 'warning' ? 'warning' : '';
                  settingsHtml += `<p class="module-info ${warningClass}">${setting.text}</p>`;
                } else {
                  const inputFieldHtml = generateInputField(setting, value, uniqueId, itemEl);
                  settingsHtml += `<div class="settings-field" ${showsWhenAttr}><label>${setting.label}</label>${inputFieldHtml}</div>`;
                }
                i++;
              }
            }
          } else {
            settingsHtml =  '<p class="module-info">このモジュールに設定項目はありません。</p>' ;
          }
          itemEl.innerHTML =  `<div class="module-header"><label class="module-toggle mdl-switch mdl-js-switch mdl-js-ripple-effect" for="switch-${uniqueId}"><input type="checkbox" id="switch-${uniqueId}" class="mdl-switch__input" data-setting-id="isEnabled" ${isEnabledChecked}></label><div class="module-title-area"><i class="material-icons module-icon">${moduleData.icon || 'extension'}</i><span class="module-name">${moduleData.name}</span><span class="module-context-name"></span></div><div class="header-actions"><button class="run-single-btn mdl-button mdl-js-button mdl-button--icon" title="このモジュールのみ実行"><i class="material-icons">play_circle_outline</i></button><button class="expand-btn mdl-button mdl-js-button mdl-button--icon" title="設定を開閉"><i class="material-icons expand-icon">expand_more</i></button><button class="delete-btn mdl-button mdl-js-button mdl-button--icon" title="削除"><i class="material-icons">close</i></button></div></div><div class="module-settings">${settingsHtml}</div>` ;
          const toggleSettings = (e) => {
            e.stopPropagation();
            const settingsDiv = itemEl.querySelector('.module-settings');
            const expandBtn = itemEl.querySelector('.expand-btn');
            const isVisible = settingsDiv.classList.toggle('is-visible');
            expandBtn.querySelector('.expand-icon').classList.toggle('is-rotated', isVisible);
            if (isVisible && itemEl.dataset.moduleId === 'control_set_variable') {
              populatePreviousModulesDropdown(itemEl);
            }
          };
          itemEl.querySelector('.module-title-area').addEventListener('click', toggleSettings);
          itemEl.querySelector('.expand-btn').addEventListener('click', toggleSettings);
          const contextNameEl = itemEl.querySelector('.module-context-name');
          if (contextNameEl) {
            if (moduleId === 'control_set_variable') {
              const input = itemEl.querySelector('[data-setting-id="variableName"]');
              if (input) {
                const updateContext = () => {
                  contextNameEl.textContent = input.value ? `(${input.value})` : '';
                };
                updateContext();
                input.addEventListener('keyup', updateContext);
              }
            } else if (moduleId === 'control_run_workflow') {
              const select = itemEl.querySelector('[data-setting-id="workflowToRun"]');
              if (select) {
                const updateContext = () => {
                  contextNameEl.textContent = select.value ? `(${select.value})` : '';
                };
                updateContext();
                select.addEventListener('change', updateContext);
              }
            }
          }
          itemEl.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            itemEl.remove();
            updateButtonStates();
          });
          itemEl.querySelector('.run-single-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const singleModuleData = getModuleDataFromElement(itemEl);
            showLoader();
            log( `モジュール「${singleModuleData.name}」を個別実行します...` );
            google.script.run
              .withSuccessHandler(response => {
                log(response, 'SUCCESS');
                hideLoader();
              })
              .withFailureHandler(error => {
                log(error.message, 'ERROR');
                hideLoader();
              })
              .runSingleModule(singleModuleData);
          });
          itemEl.querySelectorAll('[data-fetches-sheets-for]').forEach(urlInput => {
            if (urlInput.value) getAndPopulateSheetNames(urlInput, savedSettings[urlInput.dataset.fetchesSheetsFor]);
            urlInput.addEventListener('blur', () => getAndPopulateSheetNames(urlInput));
          });
          if (moduleId === 'gmail_fetch_attachments') {
            itemEl.querySelectorAll('.gmail-query-mode-radio').forEach(radio => {
              radio.addEventListener('change', e => {
                if (!e.target.checked) return;
                const mode = e.target.value;
                itemEl.querySelectorAll('[data-shows-when]').forEach(field => {
                  try {
                    const condition = JSON.parse(field.dataset.showsWhen);
                    if (condition.id === 'queryMode') {
                      field.style.display = (condition.value === mode) ? '' : 'none';
                    }
                  } catch (err) { /* ignore */ }
                });
              });
            });
          }
        }
        return itemEl;
      }

      function generateInputField(setting, value, uniqueId, moduleEl) {
        let inputFieldHtml = '';
        const settingId = setting.id;
        if (setting.type === 'select_previous_module') {
          inputFieldHtml = `<select data-setting-id="${settingId}" data-value="${value}"></select>`;
        } else if (setting.type === 'radio') {
          let radioGroupHtml = '<div class="settings-field-radio-group">';
          const name = `${settingId}-${uniqueId}`;
          const extraClass = (settingId === 'queryMode') ? 'gmail-query-mode-radio' : '';
          setting.options.forEach(opt => {
            const checked = (value === opt.value) ? 'checked' : '';
            const radioId = `radio-${name}-${opt.value}`;
            radioGroupHtml += `<label class="mdl-radio mdl-js-radio mdl-js-ripple-effect" for="${radioId}"><input type="radio" id="${radioId}" class="mdl-radio__button ${extraClass}" name="${name}" value="${opt.value}" ${checked} data-setting-id="${settingId}"><span class="mdl-radio__label">${opt.label}</span></label>`;
          });
          radioGroupHtml += '</div>';
          return radioGroupHtml;
        } else if (setting.type === 'select') {
          inputFieldHtml = `<select data-setting-id="${settingId}">`;
          if (setting.optionsSource === 'workflows') {
            inputFieldHtml +=  `<option value="">-- ワークフローを選択 --</option>` ;
            initialWorkflows.forEach(name => {
              const selected = (value === name) ? 'selected' : '';
              inputFieldHtml += `<option value="${name}" ${selected}>${name}</option>`;
            });
          } else if (setting.options && setting.options.length > 0) {
            setting.options.forEach(opt => {
              const selected = (value === opt.value) ? 'selected' : '';
              inputFieldHtml += `<option value="${opt.value}" ${selected}>${opt.label}</option>`;
            });
          }
          inputFieldHtml += `</select>`;
        } else if (setting.type === 'textarea') {
          inputFieldHtml =  `<div class="input-wrapper"><textarea data-setting-id="${settingId}" placeholder="${setting.placeholder || ''}" rows="3">${value || ''}</textarea><i class="material-icons insert-variable-btn" title="変数を挿入">data_object</i></div>` ;
        } else if (setting.type === 'checkbox') {
          const checkedAttr = value ? 'checked' : '';
          return `<label class="mdl-checkbox mdl-js-checkbox mdl-js-ripple-effect" for="checkbox-${settingId}-${uniqueId}"><input type="checkbox" id="checkbox-${settingId}-${uniqueId}" data-setting-id="${settingId}" class="mdl-checkbox__input" ${checkedAttr}></label>`;
        } else {
          let buttonHtml = '';
          if (setting.type === 'text' || setting.type === 'number') {
            buttonHtml =  '<i class="material-icons insert-variable-btn" title="変数を挿入">data_object</i>' ;
          }
          const fetchesSheetsAttr = setting.fetchesSheetsFor ? `data-fetches-sheets-for="${setting.fetchesSheetsFor}"` : '';
          inputFieldHtml = `<div class="input-wrapper"><input type="${setting.type}" value="${value || ''}" data-setting-id="${settingId}" ${fetchesSheetsAttr} placeholder="${setting.placeholder || ''}">${buttonHtml}</div>`;
        }
        return inputFieldHtml;
      }

      function getModuleDataFromElement(el) {
        const moduleId = el.dataset.moduleId;
        const moduleSettings = {};
        if (el.dataset.moduleType === 'container') {
          el.querySelector('.module-settings').querySelectorAll('[data-setting-id]').forEach(input => {
            const settingId = input.dataset.settingId;
            if (input.type === 'radio') {
              if (input.checked) moduleSettings[settingId] = input.value;
            } else if (input.type === 'checkbox') {
              moduleSettings[settingId] = input.checked;
            } else {
              moduleSettings[settingId] = input.value;
            }
          });
          el.querySelectorAll('.area-dropzone').forEach(zone => {
            const zoneType = zone.dataset.dropzoneType;
            const childModules = [];
            zone.querySelectorAll(':scope > .workflow-module').forEach(childEl => {
              childModules.push(getModuleDataFromElement(childEl));
            });
            moduleSettings[`${zoneType}Modules`] = childModules;
          });
        } else {
          el.querySelectorAll('[data-setting-id]').forEach(input => {
            const settingId = input.dataset.settingId;
            if (input.type === 'radio') {
              if (input.checked) moduleSettings[input.dataset.settingId] = input.value;
            } else if (input.type === 'checkbox') {
              moduleSettings[input.dataset.settingId] = input.checked;
            } else {
              moduleSettings[input.dataset.settingId] = input.value;
            }
          });
        }
        if (moduleId === 'gmail_fetch_attachments') {
          const queryMode = moduleSettings.queryMode || 'simple';
          if (queryMode === 'simple') {
            let queryParts = [];
            if (moduleSettings.from) queryParts.push(`from:(${moduleSettings.from})`);
            if (moduleSettings.subject) queryParts.push(`subject:(${moduleSettings.subject})`);
            if (moduleSettings.includes) queryParts.push(`${moduleSettings.includes}`);
            if (moduleSettings['has:attachment']) queryParts.push('has:attachment');
            if (moduleSettings['is:unread']) queryParts.push('is:unread');
            if (moduleSettings['is:starred']) queryParts.push('is:starred');
            moduleSettings.searchQuery = queryParts.join(' ');
          }
        }
        const moduleData = allModules.find(m => m.id === moduleId);
        return {
          id: moduleId,
          instanceId: el.dataset.instanceId,
          name: moduleData.name,
          type: moduleData.type,
          settings: moduleSettings
        };
      }

      function getWorkflowData() {
        const modules = [];
        workflowContainer.querySelectorAll(':scope > .workflow-module').forEach((el, index) => {
          const moduleData = getModuleDataFromElement(el);
          moduleData.order = index;
          modules.push(moduleData);
        });
        return modules;
      }

      function populatePreviousModulesDropdown(currentModuleEl) {
        const selectEl = currentModuleEl.querySelector('[data-setting-id="sourceModuleInstanceId"]');
        if (!selectEl) return;
        const currentValue = selectEl.value || selectEl.dataset.value;
        selectEl.innerHTML =  '<option value="">-- 値を取得するモジュールを選択 --</option>' ;
        const allModuleElements = Array.from(document.querySelectorAll('#workflow-container .workflow-module'));
        const currentIndex = allModuleElements.indexOf(currentModuleEl);
        const precedingModules = allModuleElements.slice(0, currentIndex);
        precedingModules.forEach(moduleEl => {
          const moduleId = moduleEl.dataset.moduleId;
          const instanceId = moduleEl.dataset.instanceId;
          const moduleData = allModules.find(m => m.id === moduleId);
          if (moduleData && moduleData.returnsValue) {
            const option = document.createElement('option');
            option.value = instanceId;
            let contextName = '';
            const contextNameEl = moduleEl.querySelector('.module-context-name');
            if (contextNameEl && contextNameEl.textContent) {
              contextName = ` ${contextNameEl.textContent}`;
            } else if (moduleId === 'control_group') {
              const groupNameInput = moduleEl.querySelector('[data-setting-id="groupName"]');
              if (groupNameInput && groupNameInput.value) contextName = ` (${groupNameInput.value})`;
            }
            option.textContent = `${moduleData.name}${contextName} (${instanceId.slice(-6)})`;
            if (instanceId === currentValue) option.selected = true;
            selectEl.appendChild(option);
          }
        });
      }

      function openDynamicListDialog(dialogId, contentId, dataArray, confirmCallback, options = {}) {
        const dialog = document.getElementById(dialogId);
        if (!dialog) return;

        const contentArea = document.getElementById(contentId);
        const originalConfirmBtn = dialog.querySelector('.mdl-button--colored, .mdl-button--accent');
        const originalCloseBtn = dialog.querySelector('.close');
        let selectedItemName = null;

        const confirmBtn = originalConfirmBtn.cloneNode(true);
        originalConfirmBtn.parentNode.replaceChild(confirmBtn, originalConfirmBtn);
        const closeBtn = originalCloseBtn.cloneNode(true);
        originalCloseBtn.parentNode.replaceChild(closeBtn, originalCloseBtn);
        
        dialog.querySelector('h3').textContent = options.title ||  'リストから選択' ;
        confirmBtn.textContent = options.confirmButtonText || 'OK';
        confirmBtn.disabled = true;
        
        if (!dialog.showModal) {
          dialogPolyfill.registerDialog(dialog);
        }
        dialog.showModal();

        if (!dataArray || dataArray.length === 0) {
          contentArea.innerHTML =  `<p>${options.emptyMessage || '項目が見つかりません。'}</p>` ;
          return;
        }

        const listEl = document.createElement('ul');
        listEl.className = 'dialog-item-list';
        dataArray.forEach(item => {
          const listItemEl = document.createElement('li');
          listItemEl.className = 'dialog-list-item';
          listItemEl.textContent = item;
          listItemEl.dataset.itemName = item;
          listEl.appendChild(listItemEl);
        });
        contentArea.innerHTML = '';
        contentArea.appendChild(listEl);

        // --- リスト項目選択時の処理 ---
        listEl.addEventListener('click', (e) => {
          const targetItem = e.target.closest('.dialog-list-item');
          if (!targetItem) return;
          
          listEl.querySelectorAll('.is-selected').forEach(sel => sel.classList.remove('is-selected'));
          targetItem.classList.add('is-selected');
          selectedItemName = targetItem.dataset.itemName;
          confirmBtn.disabled = false;

        });

      function populateTriggerForm(triggerData) {
        const formContainer = document.getElementById('trigger-form-container');
        formContainer.style.display = 'flex';
        const formTitle = document.getElementById('trigger-form-title');
        const uidHolder = document.getElementById('trigger-uid-holder');
        const allFormElements = formContainer.querySelectorAll('input, select, textarea');
        allFormElements.forEach(el => {
          if (el.type === 'checkbox' || el.type === 'radio') el.checked = false;
          else el.value = '';
        });
        const workflowSelect = document.getElementById('trigger-workflow-selector');
        workflowSelect.innerHTML = '';
        initialWorkflows.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          workflowSelect.appendChild(option);
        });
        const config = triggerData ? triggerData.config : {};
        if (triggerData) {
          formTitle.textContent =  'トリガーの編集' ;
          uidHolder.value = triggerData.uid;
          document.getElementById('trigger-name').value = triggerData.name || '';
          document.getElementById('trigger-description').value = triggerData.description || '';
          workflowSelect.value = triggerData.workflowName || '';
        } else {
          formTitle.textContent =  'トリガーの新規作成' ;
          uidHolder.value = '';
        }
        document.querySelectorAll('#trigger-list-in-dialog .trigger-item').forEach(item => {
          item.classList.toggle('active', item.dataset.uid === uidHolder.value);
        });
        const isTimeBased = !config.triggerType || config.triggerType.startsWith('TIME_');
        document.querySelector(`input[name="trigger-main-type"][value="panel-${isTimeBased ? 'time' : 'event'}"]`).checked = true;
        document.querySelector(`input[name="trigger-main-type"]:checked`).dispatchEvent(new Event('change', {
          bubbles: true
        }));
        if (isTimeBased) {
          const timeTypeSelect = document.getElementById('time-trigger-type');
          timeTypeSelect.value = config.triggerType || 'TIME_DAILY';
          document.getElementById('interval-minutes').value = config.interval || '10';
          document.getElementById('interval-hours').value = config.interval || '1';
          document.getElementById('interval-days').value = config.interval || '1';
          if (config.triggerType === 'TIME_SPECIFIC') {
            document.getElementById('specific-datetime').value = config.dateTime || '';
          }
          if (config.time) {
            const timeRadio = triggerDialog.querySelector(`input[name$="-time"][value="${config.time}"]`);
            if (timeRadio) timeRadio.checked = true;
          }
          if (config.days) {
            config.days.forEach(day => {
              const dayCheckbox = triggerDialog.querySelector(`input[name="weekly-day"][value="${day}"]`);
              if (dayCheckbox) dayCheckbox.checked = true;
            });
          }
          if (config.dates) {
            config.dates.forEach(date => {
              const dateCheckbox = triggerDialog.querySelector(`input[name="monthly-date"][value="${date}"]`);
              if (dateCheckbox) dateCheckbox.checked = true;
            });
          }
        } else {
          const eventTypeSelect = document.getElementById('event-trigger-type');
          eventTypeSelect.value = config.triggerType || 'EVENT_FORM_SUBMIT';
          document.getElementById('form-url').value = config.formUrl || '';
          document.getElementById('sheet-url').value = config.sheetUrl || '';
          document.getElementById('sheet-name').value = config.sheetName || '';
          document.getElementById('sheet-range').value = config.range || '';
          document.getElementById('drive-folder-url').value = config.driveFolderUrl || '';
          if (config.triggerType === 'EVENT_GMAIL_NEW') {
            const gmailQueryMode = config.gmailQueryMode || 'simple';
            triggerDialog.querySelector(`input[name="trigger_gmail_query_mode"][value="${gmailQueryMode}"]`).checked = true;
          }
        }
        document.getElementById('time-trigger-type').dispatchEvent(new Event('change'));
        document.getElementById('event-trigger-type').dispatchEvent(new Event('change'));
        const checkedGmailMode = triggerDialog.querySelector('.gmail-mode-switch:checked');
        if (checkedGmailMode) {
          checkedGmailMode.dispatchEvent(new Event('change', {
            bubbles: true
          }));
        }
        componentHandler.upgradeDom(formContainer);
      }

      function saveTrigger() {
        const uid = document.getElementById('trigger-uid-holder').value;
        const config = {
          uid: uid,
          triggerName: document.getElementById('trigger-name').value,
          triggerDescription: document.getElementById('trigger-description').value,
          workflowName: document.getElementById('trigger-workflow-selector').value,
        };
        if (!config.triggerName || !config.workflowName) {
          log( 'トリガー名と実行するワークフローは必須です。' , 'ERROR');
          return;
        }
        const activePanel = triggerDialog.querySelector('.trigger-panel.active').id;
        if (activePanel === 'panel-time') {
          config.triggerType = document.getElementById('time-trigger-type').value;
          switch (config.triggerType) {
            case 'TIME_EVERY_MINUTES':
              config.interval = document.getElementById('interval-minutes').value;
              break;
            case 'TIME_EVERY_HOURS':
              config.interval = document.getElementById('interval-hours').value;
              break;
            case 'TIME_EVERY_DAYS':
              config.interval = document.getElementById('interval-days').value;
              config.time = triggerDialog.querySelector('input[name="every_days-time"]:checked').value;
              break;
            case 'TIME_DAILY':
              config.time = triggerDialog.querySelector('input[name="daily-time"]:checked').value;
              break;
            case 'TIME_WEEKLY':
              config.days = Array.from(triggerDialog.querySelectorAll('input[name="weekly-day"]:checked')).map(cb => cb.value);
              config.time = triggerDialog.querySelector('input[name="weekly-time"]:checked').value;
              if (config.days.length === 0) {
                log( '曜日を1つ以上選択してください。' , 'ERROR');
                return;
              }
              break;
            case 'TIME_MONTHLY':
              config.dates = Array.from(triggerDialog.querySelectorAll('input[name="monthly-date"]:checked')).map(cb => parseInt(cb.value, 10));
              config.time = triggerDialog.querySelector('input[name="monthly-time"]:checked').value;
              if (config.dates.length === 0) {
                log( '日付を1つ以上選択してください。' , 'ERROR');
                return;
              }
              break;
            case 'TIME_SPECIFIC':
              config.dateTime = document.getElementById('specific-datetime').value;
              if (!config.dateTime) {
                log( '実行日時を入力してください。' , 'ERROR');
                return;
              }
              break;
          }
        } else { // panel-event
          config.triggerType = document.getElementById('event-trigger-type').value;
          switch (config.triggerType) {
            case 'EVENT_FORM_SUBMIT':
              config.formUrl = document.getElementById('form-url').value;
              break;
            case 'EVENT_SHEET_EDIT':
              config.sheetUrl = document.getElementById('sheet-url').value;
              config.sheetName = document.getElementById('sheet-name').value;
              config.range = document.getElementById('sheet-range').value;
              break;
            case 'EVENT_DRIVE_FILE_NEW':
              config.driveFolderUrl = document.getElementById('drive-folder-url').value;
              break;
            case 'EVENT_GMAIL_NEW':
              const mode = triggerDialog.querySelector('[name="trigger_gmail_query_mode"]:checked').value;
              config.gmailQueryMode = mode;
              if (mode === 'advanced') {
                config.gmailQuery = triggerDialog.querySelector('#final-gmail-query').value;
              } else {
                let queryParts = [];
                triggerDialog.querySelectorAll('.gmail-builder-input').forEach(input => {
                  if (input.type === 'text' && input.value) {
                    queryParts.push(`${input.dataset.queryKey}:(${input.value})`);
                  } else if (input.type === 'checkbox' && input.checked) {
                    queryParts.push(input.dataset.queryKey);
                  }
                });
                config.gmailQuery = queryParts.join(' ');
              }
              break;
          }
        }
        showLoader();
        const action = uid ? 'updateFlexibleTrigger' : 'createFlexibleTrigger';
        google.script.run
          .withSuccessHandler((response) => {
            log( `トリガーが正常に${uid ? '更新' : '作成'}されました。` , 'SUCCESS');
            triggerDialog.close();
            google.script.run.withSuccessHandler(triggers => {
              activeTriggers = triggers;
              updateTriggerList(activeTriggers, document.getElementById('trigger-list-in-dialog'));
              hideLoader();
            }).getTriggers();
          })
          .withFailureHandler(err => {
            log(err.message, 'ERROR');
            hideLoader();
          })
          [action](config);
      }

        saveBtn.addEventListener('click', () => {

                isPollingEnabled: dialog.querySelector('#isPollingEnabled').checked,

                .setupPollingTrigger(newSettings);
        });

        google.script.run
          .withSuccessHandler(settings => {
            appSettings = settings;
            
            let html =   '<h4>ログのメンテナンス</h4>' ;
            html +=   `<label class="mdl-switch mdl-js-switch mdl-js-ripple-effect" for="isLogArchiveEnabled"><input type="checkbox" id="isLogArchiveEnabled" class="mdl-switch__input" ${settings.isLogArchiveEnabled ? 'checked' : ''}><span class="mdl-switch__label">古い実行ログの自動アーカイブを有効にする</span></label>` ;
            html +=   '<div class="settings-field"><label for="logRetentionDays">ログの保持期間（日）:</label>' ;
            html += `<select id="logRetentionDays" value="${settings.logRetentionDays}">`;
            [30, 60, 90, 180, 365].forEach(days => {
              html +=   `<option value="${days}" ${settings.logRetentionDays == days ? 'selected' : '' }>${days}日</option>` ;
            });
            html += '</select></div>';

            html +=   '<h4>予約実行（ポーリング）設定</h4>' ;
            html +=   `<label class="mdl-switch mdl-js-switch mdl-js-ripple-effect" for="isPollingEnabled"><input type="checkbox" id="isPollingEnabled" class="mdl-switch__input" ${settings.isPollingEnabled ? 'checked' : ''}><span class="mdl-switch__label">個別修正予約の定期実行を有効にする</span></label>` ;
            html +=   '<div class="settings-field"><label for="pollingInterval">実行間隔（分）:</label>' ;
            html += `<select id="pollingInterval" ${!settings.isPollingEnabled ? 'disabled' : ''}>`;
            [10, 30, 60].forEach(minutes => {
              html +=   `<option value="${minutes}" ${settings.pollingInterval == minutes ? 'selected' : ''}>${minutes}分ごと</option>` ;
            });
            html += '</select></div>';

            contentArea.innerHTML = html;
            componentHandler.upgradeDom(contentArea);
            
            const pollingEnabledCheckbox = contentArea.querySelector('#isPollingEnabled');
            if(pollingEnabledCheckbox) {
                pollingEnabledCheckbox.addEventListener('change', function() {
                  const pollingIntervalSelect = contentArea.querySelector('#pollingInterval');
                  if(pollingIntervalSelect) {
                      pollingIntervalSelect.disabled = !this.checked;
                  }

            contentArea.innerHTML =   `<p class="error">設定の読み込みに失敗しました: ${err.message}</p>` ;
          })
          .getAppSettings();
      }

       // === イベントリスナー初期化 ===
  function initializeEventListeners() {

        switch (actionId) {

            openDynamicListDialog('open-workflow-dialog', 'open-workflow-dialog-content', initialWorkflows,

                showLoader();

                emptyMessage: '保存済みのプリセットはありません。'

          case 'delete-preset-button':

                  google.script.run
                    .withSuccessHandler(response => {

            if (buttonToClick && !buttonToClick.disabled) {

            break;

        document.querySelectorAll('.ribbon-menu-item.is-open').forEach(openMenu => {
          openMenu.classList.remove('is-open');
        });
        return;

      const menuButton = target.closest('.ribbon-menu-button');

        const parentMenuItem = menuButton.parentElement;

        document.querySelectorAll('.ribbon-menu-item.is-open').forEach(openMenu => {
          openMenu.classList.remove('is-open');
        });

    workflowContainer.addEventListener('change', function(e) {
      const input = e.target;
      if (input.type !== 'radio' || input.classList.contains('gmail-query-mode-radio')) return;
      const moduleEl = input.closest('.workflow-module');
      if (!moduleEl) return;
      const selectedValue = input.value;
      const settingId = input.name.replace(`-${moduleEl.dataset.instanceId}`, '');
      moduleEl.querySelectorAll('[data-shows-when]').forEach(fieldWrapper => {
        try {
          const condition = JSON.parse(fieldWrapper.dataset.showsWhen);
          if (condition.id === settingId) {
            fieldWrapper.style.display = (condition.value === selectedValue) ? '' : 'none';
          }
        } catch (err) {
          console.error('Invalid JSON in data-shows-when:', fieldWrapper.dataset.showsWhen, err);
        }
      });
    });
    workflowContainer.addEventListener('click', function(e) {
      const varButton = e.target.closest('.insert-variable-btn');
      if (varButton) {
        e.preventDefault();
        e.stopPropagation();
        const existingMenu = document.querySelector('.variable-menu');
        const wrapper = varButton.closest('.input-wrapper');
        if (existingMenu) {
          existingMenu.remove();
          if (wrapper && wrapper.contains(existingMenu)) return;
        }
        const currentModuleEl = varButton.closest('.workflow-module');
        const availableVariables = [];
        const allModuleElements = Array.from(document.querySelectorAll('#workflow-container .workflow-module'));
        const currentIndex = allModuleElements.indexOf(currentModuleEl);
        const precedingModules = allModuleElements.slice(0, currentIndex);
        precedingModules.forEach(moduleEl => {
          if (moduleEl.dataset.moduleId === 'control_set_variable') {
            const input = moduleEl.querySelector('[data-setting-id="variableName"]');
            if (input && input.value) {
              availableVariables.push(input.value);
            }
          }
        });
        if (availableVariables.length === 0) {
          log('このモジュールより前に設定された変数がありません。', 'INFO');
          return;
        }
        const targetInput = wrapper.querySelector('input, textarea');
        const menu = document.createElement('ul');
        menu.className = 'variable-menu';
        availableVariables.forEach(varName => {
          const li = document.createElement('li');
          li.textContent = varName;
          li.addEventListener('click', () => {
            const cursorPos = targetInput.selectionStart;
            const text = targetInput.value;
            targetInput.value = text.slice(0, cursorPos) + `{{${varName}}}` + text.slice(cursorPos);
            menu.remove();
            targetInput.focus();
          });
          menu.appendChild(li);
        });
        wrapper.appendChild(menu);
      } else {
        if (e.target.closest('button, .mdl-switch, .mdl-checkbox, .mdl-radio, input, textarea, select')) return;
        const moduleEl = e.target.closest('.workflow-module');
        if (!moduleEl) {
          if (!e.target.closest('.workflow-module')) {
            workflowContainer.querySelectorAll('.workflow-module.is-selected').forEach(mod => mod.classList.remove('is-selected'));
            lastSelectedModule = null;
          }
        } else {
          if (e.shiftKey && lastSelectedModule) {
            const allModulesInFlow = Array.from(workflowContainer.querySelectorAll(':scope > .workflow-module'));
            const lastIndex = allModulesInFlow.indexOf(lastSelectedModule);
            const currentIndex = allModulesInFlow.indexOf(moduleEl);
            const start = Math.min(lastIndex, currentIndex);
            const end = Math.max(lastIndex, currentIndex);
            allModulesInFlow.forEach((mod, index) => {
              if (index >= start && index <= end) {
                mod.classList.add('is-selected');
              } else if (!e.ctrlKey && !e.metaKey) {
                mod.classList.remove('is-selected');
              }
            });
          } else if (e.ctrlKey || e.metaKey) {
            moduleEl.classList.toggle('is-selected');
          } else {
            if (!moduleEl.classList.contains('is-selected') || workflowContainer.querySelectorAll('.workflow-module.is-selected').length > 1) {
              workflowContainer.querySelectorAll('.workflow-module.is-selected').forEach(mod => mod.classList.remove('is-selected'));
              moduleEl.classList.add('is-selected');
            }
          }
          lastSelectedModule = moduleEl.classList.contains('is-selected') ? moduleEl : null;
        }
        updateButtonStates();
      }
    });
    document.body.addEventListener('click', function(e) {
      const existingMenu = document.querySelector('.variable-menu');
      if (existingMenu && !e.target.closest('.input-wrapper')) {
        existingMenu.remove();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
        e.preventDefault();
        copySelectedModules();
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
        e.preventDefault();
        pasteFromClipboard();
      }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        e.preventDefault();
        const moduleDeleteBtn = document.getElementById('delete-module-button');
        if (moduleDeleteBtn && !moduleDeleteBtn.disabled) {
          moduleDeleteBtn.click();
        }
      }
    });
    document.getElementById('save-preset-button').addEventListener('click', saveSelectedModulesAsPreset);
    document.getElementById('preset-selector').addEventListener('change', (e) => {
      const presetName = e.target.value;
      if (presetName) {
        loadPresetToWorkflow(presetName);
        e.target.value = '';
      }
    });
    document.getElementById('open-design-doc-btn').addEventListener('click', () => {
      window.open('https://docs.google.com/document/d/1fpdJGQOEJRyyGgELqnhxyEcowZoL3E-RZd_LOWZiMbM/edit?usp=sharing', '_blank');
    });
    document.getElementById('open-user-guide-btn').addEventListener('click', () => {
      window.open('https://docs.google.com/document/d/1yvsj2tONNCEyRMxLaKThxCfqwHS4JWKGGl_uPv4A97o/edit?usp=sharing', '_blank');
    });
    document.getElementById('history-button').addEventListener('click', () => {
      showLoader();
      log('実行履歴のスプレッドシートを開いています...');
      google.script.run
        .withSuccessHandler(url => {
          hideLoader();
          if (url) {
            window.open(url, '_blank');
          } else {
            log('ログファイルが見つかりません。一度ワークフローを実行すると自動的に作成されます。', 'ERROR');
          }
        })
        .withFailureHandler(err => {
          hideLoader();
          log(`履歴の取得に失敗しました: ${err.message}`, 'ERROR');
        })
        .getExecutionLogUrl();
    });
    document.getElementById('generate-doc-btn').addEventListener('click', () => {
      const workflowModules = getWorkflowData();
      if (workflowModules.length === 0) {
        log('ワークフローが空です。仕様書は生成できません。', 'ERROR');
        return;
      }
      const workflowName = document.getElementById('workflow-selector').value || '名称未設定のワークフロー';
      const payload = {
        name: workflowName,
        modules: workflowModules
      };
      showLoader();
      log('仕様書を生成しています...');
      google.script.run
        .withSuccessHandler(docUrl => {
          hideLoader();
          log(`仕様書が生成されました。新しいタブで開きます。`, 'SUCCESS');
          window.open(docUrl, '_blank');
        })
        .withFailureHandler(err => {
          hideLoader();
          log(`仕様書の生成に失敗しました: ${err.message}`, 'ERROR');
        })
        .generateDocumentation(payload);
    });
    document.getElementById('export-gas-btn').addEventListener('click', () => {
      const workflowModules = getWorkflowData();
      if (workflowModules.length === 0) {
        log('ワークフローが空です。コードは生成できません。', 'ERROR');
        return;
      }
      const workflowName = document.getElementById('workflow-selector').value || '名称未設定のワークフロー';
      const payload = {
        name: workflowName,
        modules: workflowModules
      };
      showLoader();
      log('GASコードを生成しています...');
      google.script.run
        .withSuccessHandler(fileUrl => {
          hideLoader();
          log(`GASコードが生成されました。新しいタブでファイルを開きます。`, 'SUCCESS');
          window.open(fileUrl, '_blank');
        })
        .withFailureHandler(err => {
          hideLoader();
          log(`コードの生成に失敗しました: ${err.message}`, 'ERROR');
        })
        .exportAsGas(payload);
    });
    document.getElementById('create-from-template-ribbon-btn').addEventListener('click', () => {
      const currentWorkflowName = document.getElementById('workflow-selector').value;
      if (!currentWorkflowName) {
        log('テンプレートから新規作成するには、まずワークフローを保存する必要があります。', 'ERROR');
        return;
      }
      showLoader();
      google.script.run
        .withSuccessHandler(templateNames => {
          hideLoader();
          if (templateNames.length === 0) {
            log('Drive内にTemplatesフォルダ、またはその中にテンプレートが見つかりません。', 'ERROR');
            return;
          }
          const dialog = document.createElement('dialog');
          dialog.id = 'create-from-template-dialog';
          if (!dialog.showModal) {
            dialogPolyfill.registerDialog(dialog);
          }
          let optionsHtml = templateNames.map(name => `<option value="${name}">${name}</option>`).join('');
          dialog.innerHTML = `
            <div class="dialog-header"><h3>テンプレートから新規作成</h3></div>
            <div class="dialog-main-content">
              <div class="dialog-field">
                <label for="template-select">使用するテンプレート</label>
                <select id="template-select">${optionsHtml}</select>
              </div>
              <div class="dialog-field">
                <label for="new-sheet-name">新しいスプレッドシート名</label>
                <input type="text" id="new-sheet-name" placeholder="例: ${currentWorkflowName}用データ">
              </div>
            </div>
            <div class="dialog-actions">
              <button type="button" class="mdl-button close">キャンセル</button>
              <button type="button" class="mdl-button mdl-button--raised mdl-button--colored create">作成</button>
            </div>
          `;
          document.body.appendChild(dialog);

          const closeDialog = () => {
            if (dialog.open) dialog.close();
          };

          const handleCreate = () => {
            const selectedTemplate = dialog.querySelector('#template-select').value;
            const newFileName = dialog.querySelector('#new-sheet-name').value;
            if (!newFileName) {
              log('新しいスプレッドシート名を入力してください。', 'ERROR');
              return;
            }
            showLoader();
            google.script.run
              .withSuccessHandler(newSheetUrl => {
                hideLoader();
                navigator.clipboard.writeText(newSheetUrl).then(() => {
                  log(`シート「${newFileName}」を新規作成し、URLをクリップボードにコピーしました。`, 'SUCCESS');
                }).catch(err => {
                  log(`クリップボードへのコピーに失敗しました: ${err}`, 'ERROR');
                  log(`作成されたシートのURL: ${newSheetUrl}`, 'INFO');
                });
                closeDialog();
              })
              .withFailureHandler(err => {
                hideLoader();
                log(`シートの作成に失敗しました: ${err.message}`, 'ERROR');
                closeDialog();
              })
              .createSheetFromTemplate(selectedTemplate, newFileName, currentWorkflowName);
          };

          dialog.querySelector('.create').addEventListener('click', handleCreate);
          dialog.querySelector('.close').addEventListener('click', closeDialog);
          dialog.addEventListener('close', () => dialog.remove());

          dialog.showModal();
        })
        .withFailureHandler(err => {
          hideLoader();
          log('テンプレート一覧の取得に失敗しました。', 'ERROR');
        })
        .listTemplates();
    });
  }

       // === プリセット関連関数 ===
      function saveSelectedModulesAsPreset() {
        const selectedModules = Array.from(workflowContainer.querySelectorAll('.workflow-module.is-selected'));
        if (selectedModules.length === 0) return;
        const presetName = prompt( "プリセット名を入力してください:" , "");
        if (!presetName) {
          log( 'プリセットの保存がキャンセルされました。' , 'INFO');
          return;
        }
        const presetData = selectedModules.map(el => getModuleDataFromElement(el));
        showLoader();
        google.script.run
          .withSuccessHandler(response => {
            log(response, 'SUCCESS');
            google.script.run.withSuccessHandler(names => {
              initialPresets = names;
              updatePresetList(names);
              hideLoader();
            }).listPresets();
          })
          .withFailureHandler(error => {
            log( `プリセットの保存に失敗しました: ${error.message}` , 'ERROR');
            hideLoader();
          })
          .savePreset(presetName, presetData);
      }

      function loadPresetToWorkflow(presetName) {
        if (!presetName) return;
        showLoader();
        google.script.run
          .withSuccessHandler(modulesData => {
            if (modulesData && modulesData.length > 0) {
              const lastSelected = workflowContainer.querySelector(':scope > .workflow-module.is-selected:last-of-type');
              let lastPastedEl = lastSelected;
              const pastedElements = [];
              modulesData.forEach(moduleData => {
                const newModuleEl = createModuleElement(moduleData.id, moduleData.settings, moduleData.instanceId);
                if (newModuleEl) {
                  if (lastPastedEl) {
                    lastPastedEl.after(newModuleEl);
                  } else {
                    workflowContainer.appendChild(newModuleEl);
                  }
                  lastPastedEl = newModuleEl;
                  pastedElements.push(newModuleEl);
                }
              });
              workflowContainer.querySelectorAll('.workflow-module.is-selected').forEach(mod => mod.classList.remove('is-selected'));
              pastedElements.forEach(el => el.classList.add('is-selected'));
              componentHandler.upgradeDom();
              log( `プリセット「${presetName}」から${modulesData.length}個のモジュールを追加しました。` , 'SUCCESS');
            } else {
              log( `プリセット「${presetName}」のデータが見つからないか、空です。` , 'ERROR');
            }
            hideLoader();
          })
          .withFailureHandler(error => {
            log( `プリセットの読み込みに失敗しました: ${error.message}` , 'ERROR');
            hideLoader();
          })
          .loadPreset(presetName);
      }

       // === アプリケーション起動 ===
      showLoader();
      google.script.run
        .withSuccessHandler(initializeApp)
        .withFailureHandler((error) => {
          log( `初期データの読み込みに致命的なエラーが発生しました: ${error.message}` , 'ERROR');
          hideLoader();
        })
        .getInitialData();
        
      createDropdownMenus();
      
    });
  </script>
</body>
