<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4">

  <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <div class="mb-4">
      <label for="sourceFolder" class="block text-gray-700 text-sm font-bold mb-2">Source Folder ID or URL</label>
      <input id="sourceFolder" type="text" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
    </div>
    <div class="mb-4">
      <label for="searchTerm" class="block text-gray-700 text-sm font-bold mb-2">Search Term (in filename)</label>
      <input id="searchTerm" type="text" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
    </div>
    <div class="mb-4">
      <label for="archiveFolderName" class="block text-gray-700 text-sm font-bold mb-2">Archive Root Folder Name</label>
      <input id="archiveFolderName" type="text" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
    </div>
    <div class="flex justify-end">
      <button id="save-settings" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg flex items-center">
        <span id="save-btn-text">Save & Create Module</span>
        <i id="save-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
      </button>
    </div>
  </div>

  <script>
    (function() {
      document.getElementById('save-settings').addEventListener('click', () => {
        const saveButton = document.getElementById('save-settings');
        const buttonText = document.getElementById('save-btn-text');
        const spinner = document.getElementById('save-spinner');
        
        saveButton.disabled = true;
        buttonText.textContent = 'Saving...';
        spinner.classList.remove('hidden');

        const settings = {
          sourceFolder: document.getElementById('sourceFolder').value,
          searchTerm: document.getElementById('searchTerm').value,
          archiveFolderName: document.getElementById('archiveFolderName').value
        };

        const moduleDefinition = {
          id: `module_${Date.now()}`,
          name: `AutoArchive: ${settings.archiveFolderName}`,
          description: `Automatically archives Excel files matching '${settings.searchTerm}' from a specific folder.`,
          handler: 'ArchiveService.archiveExcelFilesHandler',
          trigger: {
            type: 'time-based',
            frequency: 'daily',
            hour: 2
          },
          settings: [
            { id: 'sourceFolder', name: 'Source Folder ID or URL', type: 'string', value: settings.sourceFolder },
            { id: 'searchTerm', name: 'Search Term', type: 'string', value: settings.searchTerm },
            { id: 'archiveFolderName', name: 'Archive Folder Name', type: 'string', value: settings.archiveFolderName }
          ]
        };

        google.script.run
          .withSuccessHandler(() => {
            alert('Archive configuration saved successfully!');
            google.script.host.close();
          })
          .withFailureHandler((err) => {
            saveButton.disabled = false;
            buttonText.textContent = 'Save & Create Module';
            spinner.classList.add('hidden');
            alert('Error: ' + err);
          })
          .saveArchiveConfig(moduleDefinition);
      });
    })();
  </script>
</body>
</html>
